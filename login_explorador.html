<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada do Explorador | NeurUp</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --roxo: #5848d0;
            --laranja: #04d361;
            --bg: #121214;
            --text: #e1e1e6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #202024;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #323238;
            box-sizing: border-box;
        }

        h2 {
            font-family: 'Plus Jakarta Sans';
            color: #fff;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        p {
            color: #a8a8b3;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 2px solid #323238;
            background: #121214;
            color: #fff;
            outline: none;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--roxo);
        }

        .codigo-box {
            border-color: var(--roxo);
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        button {
            background: var(--roxo);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background: #6a5acd;
            transform: translateY(-2px);
        }

        /* =========================================
           📱 MUTIRÃO MOBILE - RESPONSIVIDADE
           ========================================= */
        @media (max-width: 768px) {

            /* 1. Ajusta o respiro lateral para ganhar espaço na telinha */
            .main-content,
            .container {
                padding: 20px 5%;
            }

            /* 2. Centraliza e diminui os títulos para não quebrarem de linha feio */
            h1 {
                font-size: 1.8rem;
                text-align: center;
            }

            /* 3. Coloca os cards de Comunidade um embaixo do outro (1 coluna só) */
            .grid-comunidades {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            /* 4. Ajusta a barra de ferramentas do Mural para os botões não vazarem */
            .toolbar {
                justify-content: center;
                padding: 10px;
            }

            .toolbar button,
            .toolbar select {
                padding: 6px 10px;
                font-size: 0.9rem;
            }

            /* 5. Deixa a área de texto do recado mais compacta */
            .editor-area {
                min-height: 120px;
                padding: 15px;
                font-size: 1rem;
            }

            /* 6. Encolhe um pouquinho o botão flutuante de Criar Comunidade (+) */
            button[onclick*="modalCriar"] {
                width: 50px !important;
                height: 50px !important;
                bottom: 20px !important;
                right: 20px !important;
                font-size: 24px !important;
            }

            /* 7. Ajusta o Pop-up de criação para caber perfeitamente no meio do celular */
            #modalCriar>div {
                width: 85% !important;
                padding: 20px !important;
            }

            /* 8. Botão de postar no mural ocupa a largura toda para ficar fácil de clicar com o dedão */
            .btn-postar {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>⚡ Conectar ao Circuito</h2>
        <p>Crie seu acesso independente.</p>

        <input type="email" id="emailJovem" placeholder="Seu melhor e-mail">

        <input type="password" id="senhaJovem" placeholder="Crie uma senha forte">
        <small
            style="color: #a8a8b3; display: block; text-align: left; margin-top: -5px; margin-bottom: 15px; font-size: 0.75rem;">A
            senha deve ter no mínimo 6 caracteres.</small>

        <div style="text-align: left; margin-bottom: 5px; color: #a8a8b3; font-size: 0.8rem;">Código de Conexão
            Familiar:</div>
        <input type="text" id="codigoPai" class="codigo-box" placeholder="Ex: AB12CD" maxlength="6">

        <button id="btnCriarAcesso">Criar Meu Login 🚀</button>
    </div>

    <script type="module">
        import { auth, db } from './liberi.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btnCriarAcesso').onclick = async () => {
            const email = document.getElementById('emailJovem').value;
            const senha = document.getElementById('senhaJovem').value;
            const codigo = document.getElementById('codigoPai').value.trim().toUpperCase();

            if (!email || !senha || codigo.length < 6) return alert("Preencha tudo e digite o código de 6 letras/números que seu responsável te passou!");

            const btn = document.getElementById('btnCriarAcesso');
            btn.innerText = "Conectando..."; btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                const user = userCredential.user;

                await setDoc(doc(db, "usuarios", user.uid), {
                    uid: user.uid,
                    email: email,
                    tipo: "dependente_autonomo",
                    pai_uid_referencia: codigo
                });

                alert("Acesso criado com sucesso! Bem-vindo ao circuito.");
                window.location.href = "neura_kids.html";

            } catch (error) {
                console.error("Erro do Firebase:", error.code);
                let mensagemErro = "Erro ao criar conta. Tente novamente.";

                if (error.code === 'auth/email-already-in-use') {
                    mensagemErro = "Ops! Este e-mail já está sendo usado em outra conta.";
                } else if (error.code === 'auth/invalid-email') {
                    mensagemErro = "Este e-mail parece inválido. Verifique se digitou certinho!";
                } else if (error.code === 'auth/weak-password') {
                    mensagemErro = "A senha é muito fraca. Ela precisa ter pelo menos 6 caracteres.";
                }

                alert(mensagemErro);
                btn.innerText = "Criar Meu Login 🚀";
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
