<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Sugestões de Amizade</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F8F9FD;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* CABEÇALHO REFINADO */
        .cabecalho {
            text-align: center;
            margin-bottom: 35px;
        }

        .cabecalho h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .cabecalho p {
            color: #888;
            font-size: 0.95rem;
        }

        .grid-amigos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* CARD ESTILO ORKUT-MODERNO */
        .card-amigo {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }

        .card-amigo:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.08);
        }

        .foto-amigo {
            width: 85px;
            height: 85px;
            border-radius: 28px;
            object-fit: cover;
            border: 3px solid #F0EEFF;
            margin-bottom: 12px;
        }

        /* FONTES REFINADAS */
        .nome-amigo {
            display: block;
            font-family: 'Plus Jakarta Sans';
            font-weight: 700;
            color: var(--roxo);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .btn-conectar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-conectar:hover {
            opacity: 0.9;
        }

        /* TAGS DE AFINIDADE (GATILHO DE CURIOSIDADE) */
        .tag-afinidade {
            display: inline-block;
            background: #F0EEFF;
            color: var(--roxo);
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>

    <main class="container">
        <div class="cabecalho">
            <h1>Que tal novos amigos? ✨</h1>
            <p>Famílias com interesses parecidos com os seus.</p>
        </div>

        <div class="grid-amigos" id="gridAmigos">
            <p style="text-align: center; grid-column: 1/-1; color: #BBB;">Buscando pessoas incríveis...</p>
        </div>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, query, where, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                carregarNovosAmigos(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function carregarNovosAmigos(meuId) {
            const grid = document.getElementById('gridAmigos');
            // Busca usuários, exceto você mesmo
            const q = query(collection(db, "usuarios"), limit(12));

            onSnapshot(q, (snapshot) => {
                grid.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const dados = docSnap.data();
                    if (docSnap.id === meuId) return; // Não mostra você mesmo na lista

                    // Proteção contra undefined (Lógica de segurança)
                    const nome = dados.nome || dados.displayName || "Membro Líberi";
                    const foto = dados.foto || dados.photoURL || "https://via.placeholder.com/85?text=Avatar";

                    grid.insertAdjacentHTML('beforeend', `
                        <div class="card-amigo">
                            <img src="${foto}" class="foto-amigo">
                            <span class="nome-amigo">${nome}</span>
                            ${dados.afinidade ? `<span class="tag-afinidade">${dados.afinidade}</span>` : ''}
                            <button class="btn-conectar" onclick="dizerOi('${nome}')">
                                👋 Dizer Oi
                            </button>
                        </div>
                    `);
                });
            });
        }

        window.dizerOi = (nome) => {
            alert(`Aceno enviado para ${nome}! Conexões reais começam com um pequeno gesto. ✨`);
        };
    </script>
</body>

</html>
