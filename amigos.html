<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeurUp - Sugestões de Conexão</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #5848d0;
            /* Roxo NeurUp */
            --laranja: #FF8C00;
            /* Laranja Up */
            --bg: #F8F9FD;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .cabecalho {
            text-align: center;
            margin-bottom: 35px;
        }

        .cabecalho h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .cabecalho span {
            color: var(--laranja);
        }

        .grid-amigos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card-amigo {
            background: var(--card);
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(88, 72, 208, 0.05);
            transition: 0.3s;
        }

        .card-amigo:hover {
            transform: translateY(-5px);
        }

        .foto-amigo {
            width: 85px;
            height: 85px;
            border-radius: 30px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #F0EEFF;
        }

        .nome-amigo {
            display: block;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .btn-conectar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <div class="container">
        <div class="cabecalho">
            <h1>Neur<span>Up</span> Conexões</h1>
            <p>Encontre pais que trilham caminhos parecidos com o seu.</p>
        </div>
        <div id="gridAmigos" class="grid-amigos">
        </div>
    </div>

    <script type="module">
        import { db, auth, collection, query, onSnapshot, limit } from "./liberi.js";

        const meuId = auth.currentUser?.uid;
        const grid = document.getElementById('gridAmigos');

        onSnapshot(query(collection(db, "usuarios"), limit(12)), (snap) => {
            grid.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (docSnap.id === auth.currentUser?.uid) return;

                grid.insertAdjacentHTML('beforeend', `
                    <div class="card-amigo">
                        <img src="${d.foto || d.photoURL}" class="foto-amigo">
                        <span class="nome-amigo">${d.nome || d.displayName}</span>
                        <button class="btn-conectar" onclick="dizerOi('${d.nome || d.displayName}')">👋 Dizer Oi</button>
                    </div>
                `);
            });
        });

        window.dizerOi = (nome) => {
            alert(`Aceno enviado para ${nome}! No NeurUp, conexões reais transformam o desenvolvimento. ✨`);
        };
    </script>
</body>

</html>
