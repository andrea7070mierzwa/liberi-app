<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Rede | NeurUp</title>
    <link rel="icon" type="image/png" href="imagens/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #5848d0;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
        }

        .container {
            padding: 40px 5%;
            max-width: 800px;
            margin: auto;
        }

        h1 {
            color: var(--roxo);
            font-family: 'Plus Jakarta Sans';
        }

        .lista-amigos {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .amigo-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .amigo-item img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        /* =========================================
           📱 MUTIRÃO MOBILE - RESPONSIVIDADE
           ========================================= */
        @media (max-width: 768px) {

            /* 1. Ajusta o respiro lateral para ganhar espaço na telinha */
            .main-content,
            .container {
                padding: 20px 5%;
            }

            /* 2. Centraliza e diminui os títulos para não quebrarem de linha feio */
            h1 {
                font-size: 1.8rem;
                text-align: center;
            }

            /* 3. Coloca os cards de Comunidade um embaixo do outro (1 coluna só) */
            .grid-comunidades {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            /* 4. Ajusta a barra de ferramentas do Mural para os botões não vazarem */
            .toolbar {
                justify-content: center;
                padding: 10px;
            }

            .toolbar button,
            .toolbar select {
                padding: 6px 10px;
                font-size: 0.9rem;
            }

            /* 5. Deixa a área de texto do recado mais compacta */
            .editor-area {
                min-height: 120px;
                padding: 15px;
                font-size: 1rem;
            }

            /* 6. Encolhe um pouquinho o botão flutuante de Criar Comunidade (+) */
            button[onclick*="modalCriar"] {
                width: 50px !important;
                height: 50px !important;
                bottom: 20px !important;
                right: 20px !important;
                font-size: 24px !important;
            }

            /* 7. Ajusta o Pop-up de criação para caber perfeitamente no meio do celular */
            #modalCriar>div {
                width: 85% !important;
                padding: 20px !important;
            }

            /* 8. Botão de postar no mural ocupa a largura toda para ficar fácil de clicar com o dedão */
            .btn-postar {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div id="menu-principal"></div>

    <main class="container">
        <h1>Minha Rede de Apoio</h1>
        <div class="lista-amigos">
            <div class="amigo-item">
                <img src="https://via.placeholder.com/50" alt="Avatar">
                <div><strong>Maria Silva</strong><br><small>Mãe do Leo (2 anos)</small></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { renderizarMenu } from './menu.js';
        renderizarMenu();
    </script>
</body>

</html>
