<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Membros da Vila</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .container-amigos {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .cabecalho {
            text-align: center;
            margin-bottom: 40px;
        }

        .cabecalho h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .cabecalho p {
            color: #777;
            font-size: 1.1rem;
        }

        .grid-amigos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* CARD DO VIZINHO */
        .card-amigo {
            background: var(--card);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .card-amigo:hover {
            transform: translateY(-10px);
            border-color: var(--roxo);
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.1);
        }

        .foto-amigo {
            width: 90px;
            height: 90px;
            border-radius: 30px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #F0EEFF;
        }

        .nome-amigo {
            display: block;
            font-family: 'Plus Jakarta Sans';
            font-weight: 700;
            color: var(--roxo);
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .btn-conectar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-conectar:hover {
            background: #5649c0;
        }

        .vazio {
            text-align: center;
            padding: 50px;
            color: #999;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>

    <script type="module" src="menu.js"></script>

    <main class="container-amigos">
        <div class="cabecalho">
            <h1>Membros da Vila</h1>
            <p>Conheça outras famílias que estão na mesma jornada que você. ✨</p>
        </div>

        <div class="grid-amigos" id="gridAmigos">
            <p style="text-align: center; grid-column: 1/-1;">Buscando vizinhos...</p>
        </div>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                carregarMembros(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function carregarMembros(meuId) {
            const grid = document.getElementById('gridAmigos');

            // Busca todos os usuários, exceto você mesmo
            const q = query(collection(db, "usuarios"), where("__name__", "!=", meuId));

            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    grid.innerHTML = `
                        <div class="vazio">
                            <h3 style="color: var(--roxo)">A Vila ainda está crescendo!</h3>
                            <p>Convide outros pais para fazerem parte dessa rede.</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const amigo = docSnap.data();
                    const idAmigo = docSnap.id;

                    const html = `
                        <div class="card-amigo">
                            <img src="${amigo.foto || 'https://via.placeholder.com/90'}" class="foto-amigo">
                            <span class="nome-amigo">${amigo.nome}</span>
                            <button class="btn-conectar" onclick="conectarAmigo('${idAmigo}', '${amigo.nome}')">
                                👋 Dizer Oi
                            </button>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', html);
                });
            });
        }

        window.conectarAmigo = (id, nome) => {
            alert(`Que legal! Enviamos um aceno para ${nome}. Em breve vocês poderão trocar recados diretos!`);
            // Aqui futuramente criaremos uma notificação na coleção "notificacoes"
        };
    </script>
</body>

</html>
