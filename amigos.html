<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Membros da Vila</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .container-amigos {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            margin-bottom: 30px;
        }

        .grid-amigos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* CARD DE AMIGO */
        .card-amigo {
            background: var(--card);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.05);
            transition: 0.3s;
        }

        .card-amigo:hover {
            transform: translateY(-5px);
        }

        .foto-amigo {
            width: 80px;
            height: 80px;
            border-radius: 30px;
            margin-bottom: 15px;
            object-fit: cover;
            border: 3px solid #EBE8FF;
        }

        .nome-amigo {
            font-weight: 600;
            color: var(--roxo);
            display: block;
            margin-bottom: 15px;
        }

        .btn-conectar {
            background: #EBE8FF;
            color: var(--roxo);
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
        }

        .btn-conectar:hover {
            background: var(--roxo);
            color: white;
        }

        .vazio {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>

<body>

    <script type="module" src="menu.js"></script>

    <main class="container-amigos">
        <h1>🤝 Membros da Vila</h1>

        <div id="gridAmigos" class="grid-amigos">
            <div class="vazio">Buscando vizinhos...</div>
        </div>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, query, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                carregarMembros(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function carregarMembros(meuId) {
            const grid = document.getElementById('gridAmigos');

            // Busca todos os usuários cadastrados (menos você mesmo)
            const q = query(collection(db, "usuarios"), where("__name__", "!=", meuId));

            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    grid.innerHTML = "<div class='vazio'>Você é o primeiro morador desta vila! 🌱</div>";
                    return;
                }

                grid.innerHTML = "";
                snapshot.forEach((doc) => {
                    const amigo = doc.data();
                    const html = `
                        <div class="card-amigo">
                            <img src="${amigo.foto || 'https://via.placeholder.com/80'}" class="foto-amigo">
                            <span class="nome-amigo">${amigo.nome}</span>
                            <button class="btn-conectar" onclick="alert('Pedido de amizade enviado!')">Conectar</button>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', html);
                });
            });
        }
    </script>
</body>

</html>
