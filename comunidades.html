<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeurUp - Comunidades</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #5848d0;
            --laranja: #FF8C00;
            --bg: #F8F9FD;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-flex h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            margin: 0;
        }

        .btn-criar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        .lista-comus {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card-comu {
            background: white;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
        }

        .card-comu:hover {
            transform: scale(1.05);
            border: 2px solid var(--roxo);
        }

        .emoji-comu {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }

        .titulo-comu {
            font-weight: 700;
            color: #333;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <div class="container">
        <div class="header-flex">
            <h1>Redes de <span>Troca</span></h1>
            <button class="btn-criar" onclick="abrirModal()">+ Criar Comunidade</button>
        </div>
        <div id="listaComunidades" class="lista-comus"></div>
    </div>

    <script type="module">
        import { db, collection, query, onSnapshot, orderBy } from "./liberi.js";

        onSnapshot(query(collection(db, "comunidades"), orderBy("criadoEm", "desc")), (snap) => {
            const lista = document.getElementById('listaComunidades');
            lista.innerHTML = "";
            snap.forEach(docSnap => {
                const c = docSnap.data();
                lista.insertAdjacentHTML('beforeend', `
                    <div class="card-comu" onclick="window.location.href='grupos.html?id=${docSnap.id}'">
                        <span class="emoji-comu">${c.emoji}</span>
                        <span class="titulo-comu">${c.nome}</span>
                    </div>
                `);
            });
        });
    </script>
</body>

</html>
