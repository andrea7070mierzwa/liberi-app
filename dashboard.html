<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Dashboard Oficial</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --roxo-claro: #A29BFE;
            --bg: #F8F9FD;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .layout-geral {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        /* PERFIL & LINKS */
        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 35px;
            border: 4px solid #FFF;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.06);
            object-fit: cover;
        }

        .nome-user {
            font-family: 'Plus Jakarta Sans';
            font-weight: 800;
            color: var(--roxo);
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 15px;
            display: block;
        }

        .orkut-links {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            text-align: left;
            font-size: 0.85rem;
            color: #666;
        }

        .orkut-links li {
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        /* FOFOCA & APOIO */
        .fofoca-box {
            background: #FFF4E5;
            border: 1px solid #FFE082;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 15px;
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        .apoio-box {
            background: #F0EEFF;
            border: 1px dashed var(--roxo);
            border-radius: 20px;
            padding: 15px;
            text-align: left;
        }

        .depoimento-item {
            font-size: 0.75rem;
            font-style: italic;
            color: #555;
            margin-top: 8px;
            border-bottom: 1px solid #E0DBFF;
            padding-bottom: 5px;
        }

        /* EDITOR E PALETA */
        #campoPost {
            width: 100%;
            min-height: 100px;
            background: #F0F2F9;
            border-radius: 20px;
            padding: 15px;
            outline: none;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .toolbar {
            display: none;
            gap: 10px;
            margin-top: 10px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            align-items: center;
        }

        .btn-t {
            background: #EEE;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* FEED & LOCK */
        .post-card {
            border-left: 4px solid var(--roxo);
            padding: 15px;
            background: white;
            border-radius: 18px;
            margin-bottom: 15px;
            position: relative;
        }

        .blur-content {
            filter: blur(5px);
            pointer-events: none;
        }

        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            border-radius: 18px;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <main class="layout-geral">
        <aside>
            <div class="card" style="text-align: center;">
                <img id="userFoto" src="" class="foto-perfil">
                <span id="userName" class="nome-user">...</span>
                <ul class="orkut-links">
                    <li>💬 Recados (12)</li>
                    <li onclick="window.location.href='amigos.html'">👥 Amigos (<b>312</b>)</li>
                    <li onclick="window.location.href='comunidades.html'">🔍 Comunidades (<b>47</b>)</li>
                    <li>📄 Depoimentos (8)</li>
                </ul>
                <div class="fofoca-box" id="gavetaFofoca">
                    <span style="font-size:0.6rem; font-weight:800; color:#B7791F;">FOFOCA DA VILA 🔥</span>
                    <p id="msgFofoca" style="font-size:0.8rem; margin:5px 0; color:#856404; font-weight:600;"></p>
                </div>
                <div class="apoio-box">
                    <span style="font-size:0.7rem; font-weight:800; color:var(--roxo);">REDE DE APOIO 💜</span>
                    <div id="listaDepoimentos"></div>
                </div>
            </div>
        </aside>

        <section>
            <div class="card">
                <div id="campoPost" contenteditable="true" placeholder="Mencione com @ ou use a paleta 🎨"></div>
                <div class="toolbar" id="tools">
                    <button class="btn-t" onclick="document.execCommand('bold')">B</button>
                    <button class="btn-t" onclick="document.execCommand('italic')">I</button>
                    <input type="color" onchange="document.execCommand('foreColor', false, this.value)"
                        style="border:none; width:30px; height:30px; cursor:pointer;">
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center;">
                    <button onclick="window.toggleTools()"
                        style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🎨</button>
                    <button id="btnPostar"
                        style="background:var(--roxo); color:white; border:none; padding:10px 25px; border-radius:15px; font-weight:600; cursor:pointer;">Publicar</button>
