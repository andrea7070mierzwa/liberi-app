<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F8F9FD;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .layout-orkut {
            display: grid;
            grid-template-columns: 240px 1fr 260px;
            gap: 20px;
            max-width: 1200px;
            margin: 25px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.04);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* GAVETA DE FOFOQUINHAS (NOTIFICAÇÕES) */
        .fofoca-box {
            background: #FFF4E5;
            border-radius: 18px;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #FFE082;
            text-align: left;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        .fofoca-box span {
            font-size: 0.7rem;
            font-weight: 800;
            color: #B7791F;
            text-transform: uppercase;
        }

        .fofoca-box p {
            font-size: 0.8rem;
            margin: 5px 0;
            color: #856404;
            font-weight: 600;
            cursor: pointer;
        }

        .foto-perfil {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            border: 3px solid #FFF;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
        }

        /* EDITOR E FEED */
        #campoPost {
            width: 100%;
            border: none;
            background: #F0F2F9;
            border-radius: 20px;
            padding: 15px;
            font-family: 'Poppins';
            font-size: 0.9rem;
            min-height: 100px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-postar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            float: right;
            margin-top: 10px;
        }

        .post-card {
            border-left: 4px solid var(--roxo);
            padding: 15px;
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .blur-content {
            filter: blur(4px);
            pointer-events: none;
        }

        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            flex-direction: column;
            z-index: 5;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>

    <main class="layout-orkut">
        <aside>
            <div class="card" style="text-align: center;">
                <img id="userFoto" src="" class="foto-perfil">
                <strong id="userName"
                    style="display: block; margin-top: 10px; color: var(--roxo); font-size: 0.9rem;">...</strong>

                <div id="gavetaFofoca" style="display: none;">
                    <div class="fofoca-box">
                        <span>Fofoca da Vila 🔥</span>
                        <p id="msgFofoca"></p>
                    </div>
                </div>

                <div style="text-align: left; margin-top: 20px;">
                    <span style="font-size: 0.75rem; font-weight: 800; color: #AAA; text-transform: uppercase;">Novos
                        Amigos ✨</span>
                    <div id="miniAmigos"
                        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;"></div>
                </div>
            </div>
        </aside>

        <section>
            <div class="card">
                <div id="campoPost" contenteditable="true" placeholder="Mencione alguém com @..."></div>
                <button id="btnPostar" class="btn-postar">Publicar</button>
                <div style="clear: both;"></div>
            </div>
            <div id="feedHibrido"></div>
        </section>

        <aside>
            <div class="card">
                <h3 style="font-size: 0.85rem; color: #AAA; text-transform: uppercase;">Comunidades</h3>
                <div id="listaComus"></div>
            </div>
        </aside>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let minhasComus = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userFoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName;

                // Puxar comunidades do usuário para a "Regra de Ouro"
                const snap = await getDoc(doc(db, "usuarios", user.uid));
                if (snap.exists()) minhasComus = snap.data().comunidades || [];

                ouvirFofocas(user.displayName);
                carregarFeed();
            } else { window.location.href = "index.html"; }
        });

        // ESCUTA SE ALGUÉM TE MARCOU (O Gatilho!)
        function ouvirFofocas(meuNome) {
            const q = query(collection(db, "notificacoes"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                snap.forEach(d => {
                    const n = d.data();
                    if (n.para === meuNome) {
                        document.getElementById('gavetaFofoca').style.display = 'block';
                        document.getElementById('msgFofoca').innerText = n.mensagem;
                    }
                });
            });
        }

        function carregarFeed() {
            const q = query(collection(db, "posts"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feedHibrido');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const souMembro = p.comunidadeId ? minhasComus.includes(p.comunidadeId) : true;

                    feed.insertAdjacentHTML('beforeend', `
                        <div class="post-card">
                            <strong style="font-size: 0.8rem; color: var(--roxo);">${p.autor}</strong>
                            <div class="${souMembro ? '' : 'blur-content'}">
                                <p style="font-size: 0.9rem;">${p.texto}</p>
                            </div>
                            ${!souMembro ? `<div class="lock-overlay"><span>🔒 Conteúdo para membros</span></div>` : ''}
                        </div>
                    `);
                });
            });
        }

        document.getElementById('btnPostar').onclick = async () => {
            const campo = document.getElementById('campoPost');
            const texto = campo.innerText;
            if (!texto.trim()) return;

            // LÓGICA DA MARCAÇÃO @
            const match = texto.match(/@(\w+)/);
            if (match) {
                await addDoc(collection(db, "notificacoes"), {
                    para: match[1],
                    mensagem: `${auth.currentUser.displayName} te marcou em um post!`,
                    data: serverTimestamp()
                });
            }

            await addDoc(collection(db, "posts"), {
                texto: texto,
                autor: auth.currentUser.displayName,
                fotoAutor: auth.currentUser.photoURL,
                autorId: auth.currentUser.uid,
                data: serverTimestamp()
            });
            campo.innerText = "";
        };
    </script>
</body>

</html>
