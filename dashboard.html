<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F8F9FD;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .layout-orkut {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            gap: 20px;
            max-width: 1200px;
            margin: 25px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.04);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* SEÇÃO DE DEPOIMENTOS (APOIO) */
        .apoio-box {
            background: #F0EEFF;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            border: 1px dashed var(--roxo);
        }

        .apoio-box span {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--roxo);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .depoimento-item {
            font-size: 0.8rem;
            color: #555;
            font-style: italic;
            margin-top: 10px;
            line-height: 1.4;
            border-bottom: 1px solid #E0DBFF;
            padding-bottom: 8px;
        }

        .autor-depo {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--roxo);
            display: block;
            margin-top: 4px;
            text-align: right;
        }

        .btn-enviar-apoio {
            background: none;
            border: none;
            color: var(--roxo);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-decoration: underline;
        }

        /* FOTO E STATUS */
        .foto-perfil {
            width: 90px;
            height: 90px;
            border-radius: 30px;
            border: 3px solid #FFF;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        /* FEED E LOCK */
        .post-card {
            border-left: 4px solid var(--roxo);
            padding: 15px;
            background: white;
            border-radius: 18px;
            margin-bottom: 15px;
            position: relative;
        }

        .blur-content {
            filter: blur(5px);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>

    <main class="layout-orkut">
        <aside>
            <div class="card" style="text-align: center;">
                <img id="userFoto" src="" class="foto-perfil">
                <strong id="userName"
                    style="display: block; margin-top: 12px; color: var(--roxo); font-family: 'Plus Jakarta Sans';">...</strong>

                <div class="apoio-box">
                    <span>Rede de Apoio 💜</span>
                    <div id="listaDepoimentos">
                        <p class="depoimento-item">"Você é uma mãe incrível, Andrea! O Neuras hoje vai ser só gratidão."
                            <span class="autor-depo">- Roberto</span></p>
                    </div>
                    <button class="btn-enviar-apoio" onclick="enviarDepoimento()">+ Deixar um carinho</button>
                </div>

                <div style="text-align: left; margin-top: 25px;">
                    <span style="font-size: 0.7rem; font-weight: 800; color: #AAA; text-transform: uppercase;">Amigos
                        (9)</span>
                    <div id="miniAmigos"
                        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;">
                        <img src="https://i.pravatar.cc/80?u=1" style="width:100%; border-radius:10px;">
                        <img src="https://i.pravatar.cc/80?u=2" style="width:100%; border-radius:10px;">
                        <img src="https://i.pravatar.cc/80?u=3" style="width:100%; border-radius:10px;">
                    </div>
                </div>
            </div>
        </aside>

        <section>
            <div class="card">
                <div id="campoPost" contenteditable="true"
                    style="width: 100%; min-height: 80px; outline: none; font-size: 0.9rem;"
                    placeholder="Compartilhe um momento..."></div>
                <button id="btnPostar"
                    style="background: var(--roxo); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:600; cursor:pointer; float:right; margin-top:10px;">Publicar</button>
                <div style="clear:both;"></div>
            </div>
            <div id="feedHibrido"></div>
        </section>

        <aside>
            <div class="card">
                <h3
                    style="font-size: 0.8rem; color: #AAA; text-transform: uppercase; font-family: 'Plus Jakarta Sans';">
                    Comunidades</h3>
                <div id="listaComusRapidas">
                    <p
                        style="font-size: 0.85rem; font-weight: 600; color: var(--roxo); margin-bottom: 8px; cursor:pointer;">
                        🧩 Mães Atípicas</p>
                    <p
                        style="font-size: 0.85rem; font-weight: 600; color: var(--roxo); margin-bottom: 8px; cursor:pointer;">
                        🤱 Aleitamento Materno</p>
                </div>
            </div>
        </aside>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userFoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName;
                carregarFeed();
                ouvirDepoimentos(user.uid);
            } else { window.location.href = "index.html"; }
        });

        // Função para enviar depoimento (Carinho)
        window.enviarDepoimento = async () => {
            const msg = prompt("Deixe uma mensagem de apoio para Andrea:");
            if (msg) {
                await addDoc(collection(db, "depoimentos"), {
                    para: auth.currentUser.uid,
                    de: auth.currentUser.displayName,
                    texto: msg,
                    data: serverTimestamp()
                });
            }
        };

        function ouvirDepoimentos(uid) {
            const q = query(collection(db, "depoimentos"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('listaDepoimentos');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const dep = d.data();
                    lista.insertAdjacentHTML('beforeend', `
                        <p class="depoimento-item">"${dep.texto}" <span class="autor-depo">- ${dep.de}</span></p>
                    `);
                });
            });
        }

        // Função simplificada de Feed para teste
        function carregarFeed() {
            const q = query(collection(db, "posts"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feedHibrido');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    feed.insertAdjacentHTML('beforeend', `
                        <div class="post-card">
                            <strong style="font-size:0.8rem; color:var(--roxo);">${p.autor}</strong>
                            <p style="font-size:0.9rem;">${p.texto}</p>
                        </div>
                    `);
                });
            });
        }
    </script>
</body>

</html>
