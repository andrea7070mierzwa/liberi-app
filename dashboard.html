<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Dashboard Colorido</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .layout-geral {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 25px;
            max-width: 1250px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.05);
            margin-bottom: 25px;
        }

        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 35px;
            border: 4px solid #EBE8FF;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .nome-user {
            font-family: 'Plus Jakarta Sans';
            font-weight: 800;
            color: var(--roxo);
            display: block;
            margin-bottom: 20px;
            text-align: center;
        }

        /* TOOLBAR ESTILO ORKUT COLORIDO */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            background: #f8f7ff;
            padding: 12px;
            border-radius: 15px;
            flex-wrap: wrap;
        }

        .btn-tool {
            background: white;
            border: 1px solid #ddd;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins';
            transition: 0.3s;
        }

        .btn-tool:hover {
            background: var(--roxo);
            color: white;
            border-color: var(--roxo);
        }

        /* Seletor de cor discreto */
        .input-cor {
            border: none;
            width: 35px;
            height: 35px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        #campoPost {
            width: 100%;
            border: 2px solid #f8f7ff;
            background: #f8f7ff;
            border-radius: 15px;
            padding: 15px;
            font-family: 'Poppins';
            font-size: 1rem;
            min-height: 150px;
            outline: none;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #campoPost:focus {
            background: white;
            border-color: var(--roxo);
        }

        .btn-postar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            float: right;
        }

        .post-card {
            border-left: 5px solid var(--roxo);
            padding: 20px;
            margin-bottom: 20px;
            background: white;
            border-radius: 20px;
        }

        .post-conteudo {
            line-height: 1.6;
            word-wrap: break-word;
        }

        .post-conteudo img {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            display: block;
        }

        .btn-excluir {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .link-comentarios {
            color: var(--roxo);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <main class="layout-geral">
        <aside>
            <div class="card" style="text-align: center;">
                <img id="userFoto" src="" class="foto-perfil">
                <span id="userName" class="nome-user">...</span>
                <button class="card" style="width: 100%; cursor: pointer; border: none;"
                    onclick="window.location.href='perfil.html'">👤 Meu Perfil</button>
            </div>
        </aside>

        <section>
            <div class="card">
                <h2 style="font-family: 'Plus Jakarta Sans'; color: var(--roxo); margin-top:0;">Criar Postagem ✨</h2>

                <div class="toolbar">
                    <button class="btn-tool" onclick="formatar('bold')" title="Negrito">B</button>
                    <button class="btn-tool" onclick="formatar('italic')" title="Itálico">I</button>
                    <button class="btn-tool" onclick="formatar('underline')" title="Sublinhado">U</button>

                    <div style="display: flex; align-items: center; gap: 5px; margin-left: 5px;">
                        <span style="font-size: 0.8rem; font-weight: 600; color: #666;">Cor:</span>
                        <input type="color" class="input-cor" id="corTexto" onchange="mudarCor(this.value)"
                            title="Escolher cor">
                    </div>

                    <button class="btn-tool" onclick="inserirImagem()" style="margin-left: auto;">🖼️ Imagem</button>
                </div>

                <div id="campoPost" contenteditable="true" placeholder="Deixe sua marca colorida aqui..."></div>

                <button id="btnPostar" class="btn-postar">Publicar Post →</button>
                <div style="clear: both;"></div>
            </div>
            <div id="feedPosts"></div>
        </section>

        <aside>
            <div class="card">
                <h3 style="font-family: 'Plus Jakarta Sans'; color: var(--roxo);">🔍 Comunidades</h3>
                <a href="comunidades.html" style="color: #6C5CE7; text-decoration: none; font-weight: 600;">Explorar
                    →</a>
            </div>
        </aside>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Funções de Formatação e Cor
        window.formatar = (comando) => {
            document.execCommand(comando, false, null);
            document.getElementById('campoPost').focus();
        };

        window.mudarCor = (cor) => {
            document.execCommand('foreColor', false, cor);
            document.getElementById('campoPost').focus();
        };

        window.inserirImagem = () => {
            const url = prompt("Cole o link da imagem (ex: https://site.com/foto.jpg):");
            if (url) {
                document.execCommand('insertImage', false, url);
                document.getElementById('campoPost').focus();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userFoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName.split(' ')[0];
                carregarFeed();
            } else { window.location.href = "index.html"; }
        });

        function carregarFeed() {
            const q = query(collection(db, "posts"), orderBy("data", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feedPosts');
                feed.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const id = docSnap.id;
                    const eDono = auth.currentUser && (post.autorId === auth.currentUser.uid || auth.currentUser.email === "ANDREA_ADMIN@gmail.com");

                    feed.insertAdjacentHTML('beforeend', `
                        <div class="post-card card">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <img src="${post.fotoAutor}" style="width: 35px; height: 35px; border-radius: 12px;">
                                    <strong style="color: #6C5CE7;">${post.autor}</strong>
                                </div>
                                ${eDono ? `<button onclick="window.excluirPost('${id}')" class="btn-excluir">🗑️ Apagar</button>` : ''}
                            </div>
                            <div class="post-conteudo">${post.texto}</div>
                            <a href="discussao.html?id=${id}" class="link-comentarios" style="display:block; margin-top:15px; border-top: 1px solid #f0eeff; padding-top: 10px;">💬 Ver comentários</a>
                        </div>`);
                });
            });
        }

        window.excluirPost = async (id) => {
            if (confirm("Deseja apagar este post colorido?")) await deleteDoc(doc(db, "posts", id));
        };

        document.getElementById('btnPostar').onclick = async () => {
            const campo = document.getElementById('campoPost');
            // Limpa o conteúdo se for apenas um <br>
            const conteudo = campo.innerHTML.trim();
            if (!conteudo || conteudo === "<br>") return;

            await addDoc(collection(db, "posts"), {
                texto: conteudo,
                autor: auth.currentUser.displayName,
                fotoAutor: auth.currentUser.photoURL,
                autorId: auth.currentUser.uid,
                data: serverTimestamp()
            });
            campo.innerHTML = "";
            document.getElementById('corTexto').value = "#000000"; // Reseta a cor no seletor
        };
    </script>
</body>

</html>
