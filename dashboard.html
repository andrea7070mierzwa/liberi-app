<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Vila de Apoio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .layout-vila {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 25px;
            max-width: 1250px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.05);
            margin-bottom: 25px;
        }

        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 35px;
            border: 4px solid #EBE8FF;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .nome-user {
            font-family: 'Plus Jakarta Sans';
            font-weight: 800;
            color: var(--roxo);
            display: block;
            margin-bottom: 20px;
            text-align: center;
        }

        textarea {
            width: 100%;
            border: none;
            background: #F8F7FF;
            border-radius: 15px;
            padding: 15px;
            font-family: 'Poppins';
            font-size: 1rem;
            resize: none;
            min-height: 100px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-postar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            float: right;
        }

        .post-real {
            border-left: 5px solid var(--roxo);
            padding: 20px;
            margin-bottom: 20px;
            background: white;
            border-radius: 20px;
        }

        .link-discussao {
            color: var(--roxo);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .btn-excluir {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <main class="layout-vila">
        <aside>
            <div class="card" style="text-align: center;">
                <img id="userFoto" src="" class="foto-perfil">
                <span id="userName" class="nome-user">...</span>
                <button class="card" style="width: 100%; cursor: pointer; border: none;"
                    onclick="window.location.href='perfil.html'">👤 Meu Perfil</button>
                <button class="card" style="width: 100%; cursor: pointer; border: none;"
                    onclick="window.location.href='recados.html'">📬 Meus Recados</button>
            </div>
        </aside>

        <section>
            <div class="card">
                <h2 style="font-family: 'Plus Jakarta Sans'; color: var(--roxo); margin-top:0;">O que está na sua
                    cabeça?</h2>
                <textarea id="campoNeura" placeholder="Compartilhe sua neura do dia..."></textarea>
                <button id="btnPostarNeura" class="btn-postar">Postar Neura →</button>
                <div style="clear: both;"></div>
            </div>
            <div id="feedReal"></div>
        </section>

        <aside>
            <div class="card">
                <h3 style="font-family: 'Plus Jakarta Sans'; color: var(--roxo);">🔍 Explorar</h3>
                <a href="comunidades.html" style="color: #6C5CE7; text-decoration: none; font-weight: 600;">Ver todas as
                    vilas →</a>
            </div>
        </aside>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userFoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName.split(' ')[0];
                carregarFeed();
            } else { window.location.href = "index.html"; }
        });

        function carregarFeed() {
            const q = query(collection(db, "topicos"), orderBy("data", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feedReal');
                feed.innerHTML = "";
                const user = auth.currentUser;

                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const id = docSnap.id;
                    const eDono = user && (post.autorId === user.uid || user.email === "ANDREA_ADMIN@gmail.com");

                    feed.insertAdjacentHTML('beforeend', `
                        <div class="post-real card">
                            <div style="display: flex; justify-content: space-between;">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <img src="${post.fotoAutor}" style="width: 30px; height: 30px; border-radius: 10px;">
                                    <strong style="color: #6C5CE7;">${post.autor}</strong>
                                </div>
                                ${eDono ? `<button onclick="window.excluirItem('${id}', 'topicos')" class="btn-excluir">🗑️</button>` : ''}
                            </div>
                            <p>${post.texto}</p>
                            <a href="discussao.html?id=${id}" class="link-discussao">💬 Ver discussão</a>
                        </div>`);
                });
            });
        }

        window.excluirItem = async (id, col) => {
            if (confirm("Apagar postagem?")) await deleteDoc(doc(db, col, id));
        };

        document.getElementById('btnPostarNeura').onclick = async () => {
            const campo = document.getElementById('campoNeura');
            if (!campo.value) return;
            await addDoc(collection(db, "topicos"), {
                texto: campo.value, autor: auth.currentUser.displayName,
                fotoAutor: auth.currentUser.photoURL, autorId: auth.currentUser.uid,
                data: serverTimestamp()
            });
            campo.value = "";
        };
    </script>
</body>

</html>
