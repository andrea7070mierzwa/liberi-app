<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NeurUp</title>
    <link rel="icon" type="image/png" href="imagens/favicon.png">

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --roxo: #5848d0;
            --laranja: #FF8C00;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #333;
        }

        /* --- Header: Logo e Menu --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .logo-img {
            height: 45px;
        }

        /* --- Layout de 3 Colunas Fixo --- */
        .main-container {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr) 260px;
            gap: 20px;
            padding: 20px 5%;
            max-width: 1400px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(88, 72, 208, 0.05);
            margin-bottom: 20px;
            position: relative;
        }

        /* --- Sidebar Esquerda --- */
        .perfil-card {
            text-align: center;
        }

        .perfil-card img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid var(--laranja);
            object-fit: cover;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            text-decoration: none;
            color: #555;
            font-weight: 500;
            border-radius: 15px;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .menu-link.active,
        .menu-link:hover {
            background: var(--roxo);
            color: white;
        }

        /* --- Ferramentas do Orkut --- */
        .post-area {
            border: 2px solid #f0edff;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            background: white;
        }

        .toolbar {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .toolbar button,
        .toolbar select,
        .toolbar input[type="color"] {
            background: #eee;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #333;
        }

        .toolbar button:hover {
            background: #ddd;
        }

        .toolbar input[type="color"] {
            width: 40px;
            height: 34px;
            padding: 0;
        }

        #postContent {
            width: 100%;
            min-height: 120px;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            color: #333;
            overflow-y: auto;
            max-width: 100%;
        }

        #postContent img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        #postContent[contenteditable]:empty:before {
            content: attr(placeholder);
            color: #999;
            display: block;
        }

        /* Garante que imagens postadas no feed não quebrem o layout */
        .feed-item img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 10px;
            display: block;
        }

        .feed-post-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .feed-post-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
        }

        .feed-post-header .author-info strong {
            color: var(--roxo);
            font-size: 1rem;
        }

        .feed-post-header .author-info small {
            color: #888;
            font-size: 0.75rem;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            border-top: 1px solid #f5f5f5;
            padding-top: 15px;
        }

        .btn-reaction {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            transition: 0.2s;
            color: #666;
        }

        .btn-reaction:hover {
            transform: scale(1.3);
            color: var(--roxo);
        }

        .delete-btn {
            margin-left: auto;
            color: #dc2626;
            display: none;
        }

        .delete-btn.ativo {
            display: block;
        }

        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }

        /* =========================================
           📱 MUTIRÃO MOBILE - RESPONSIVIDADE
           ========================================= */
        @media (max-width: 768px) {

            /* 1. Ajusta o respiro lateral para ganhar espaço na telinha */
            .main-content,
            .container {
                padding: 20px 5%;
            }

            /* 2. Centraliza e diminui os títulos para não quebrarem de linha feio */
            h1 {
                font-size: 1.8rem;
                text-align: center;
            }

            /* 3. Coloca os cards de Comunidade um embaixo do outro (1 coluna só) */
            .grid-comunidades {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            /* 4. Ajusta a barra de ferramentas do Mural para os botões não vazarem */
            .toolbar {
                justify-content: center;
                padding: 10px;
            }

            .toolbar button,
            .toolbar select {
                padding: 6px 10px;
                font-size: 0.9rem;
            }

            /* 5. Deixa a área de texto do recado mais compacta */
            .editor-area {
                min-height: 120px;
                padding: 15px;
                font-size: 1rem;
            }

            /* 6. Encolhe um pouquinho o botão flutuante de Criar Comunidade (+) */
            button[onclick*="modalCriar"] {
                width: 50px !important;
                height: 50px !important;
                bottom: 20px !important;
                right: 20px !important;
                font-size: 24px !important;
            }

            /* 7. Ajusta o Pop-up de criação para caber perfeitamente no meio do celular */
            #modalCriar>div {
                width: 85% !important;
                padding: 20px !important;
            }

            /* 8. Botão de postar no mural ocupa a largura toda para ficar fácil de clicar com o dedão */
            .btn-postar {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div id="menu-principal"></div>
    <main class="main-container">
        <aside class="sidebar">
            <div class="card perfil-card">
                <img id="fotoPerfil" src="" alt="Avatar">
                <h4 id="nomeUsuario" style="color: var(--roxo); margin: 10px 0 5px 0;">...</h4>
                <small id="labelPersona"
                    style="text-transform: uppercase; color: #888; font-weight: 700; font-size: 0.7rem;"></small>
            </div>

            <nav class="card" style="padding: 10px;">
                <a href="dashboard.html" class="menu-link active">🏠 Circuito Principal</a>
                <a href="comunidades.html" class="menu-link">🤝 Comunidades</a>
                <a href="neura_kids.html" class="menu-link" style="color: var(--laranja); font-weight: 800;">🧠
                    Perguntar à Neura</a>
            </nav>
        </aside>

        <section class="feed">
            <div class="card">
                <h5 style="margin:0; color: var(--roxo);">📢 Compartilhar com o Circuito</h5>
                <div class="post-area">
                    <div class="toolbar">
                        <button id="boldBtn" title="Negrito"><i class="fas fa-bold"></i></button>
                        <button id="italicBtn" title="Itálico"><i class="fas fa-italic"></i></button>
                        <select id="sizeSelect" title="Tamanho">
                            <option value="3">Pequeno</option>
                            <option value="4" selected>Normal</option>
                            <option value="5">Grande</option>
                        </select>
                        <input type="color" id="colorPicker" value="#333333" title="Cor">
                        <button id="imgBtn" title="Inserir Imagem"><i class="fas fa-image"></i></button>
                        <input type="file" id="fileInput" accept="image/*" style="display:none;">
                    </div>
                    <div id="postContent" contenteditable="true"
                        placeholder="Clique aqui para contar uma descoberta..."></div>
                </div>
                <button id="btnPostar"
                    style="background:var(--roxo); color:white; border:none; padding:12px; border-radius:15px; font-weight:700; cursor:pointer; width:100%;">Postar
                    no Circuito</button>
            </div>

            <div id="feedPrincipal"></div>
        </section>

        <aside class="sidebar">

            <div class="card">
                <h5 style="color: var(--roxo); margin-top: 0;">🎯 Dependente Cadastrado</h5>
                <div id="containerAcessoFilho" style="text-align: center; padding: 10px 0;">
                    <small style="color: #999;">Buscando dados...</small>
                </div>
            </div>

            <div class="card">
                <h5 style="color: var(--roxo); margin-top: 0;">🛡️ Monitor Kids</h5>
                <div id="monitorizacaoKids" style="font-size: 0.85rem; color: #999; text-align: center;">
                    Buscando sinais no circuito...
                </div>
            </div>
        </aside>
    </main>

    <script type="module">
        import { renderizarMenu } from './menu.js';
        import { auth, db } from './liberi.js';
        import { doc, getDoc, collection, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        renderizarMenu();

        // NOVO: Função global de revelar/esconder o código familiar
        window.toggleCodigoFamiliar = function () {
            const span = document.getElementById('textoCodigoFamiliar');
            const icone = document.getElementById('iconeOlhoCodigo');

            // Verifica se está borrado para revelar
            if (span.style.filter.includes('blur')) {
                span.style.filter = 'none';
                icone.classList.remove('fa-eye');
                icone.classList.add('fa-eye-slash');
            } else {
                span.style.filter = 'blur(5px)';
                icone.classList.remove('fa-eye-slash');
                icone.classList.add('fa-eye');
            }
        };

        let currentUserId = '';

        // 1. CARREGAR PERFIL
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUserId = user.uid;
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));

                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById('nomeUsuario').innerText = user.displayName.split(' ')[0];
                    if (user.photoURL) document.getElementById('fotoPerfil').src = user.photoURL;
                    document.getElementById('labelPersona').innerText = d.persona || "Membro";
                    // TRAVA DE SEGURANÇA: Se a criança cair no painel do pai por engano, joga ela de volta pro Kids.
                    if (d.tipo === "dependente_autonomo") {
                        window.location.href = "neura_kids.html";
                        return;
                    }

                    // === LÓGICA DO BOTÃO E LINK DO DEPENDENTE ===
                    if (d.filho && d.filho.nome) {
                        const nomeDoFilho = d.filho.nome;
                        const codigoFamiliar = user.uid.substring(0, 6).toUpperCase();
                        const linkAcesso = "https://neurup.app/login_explorador.html"; // O endereço da porta deles
                        const container = document.getElementById('containerAcessoFilho');

                        container.innerHTML = `
        <div style="font-weight: 600; color: var(--roxo); margin-bottom: 10px;">${nomeDoFilho}</div>
        
        <button onclick="window.location.href='neura_kids.html'" 
            style="background: var(--laranja); color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; margin-bottom: 15px;">
            Acessar painel de ${nomeDoFilho}
        </button>
        
        <div style="background: #fff5eb; border: 1px dashed var(--laranja); padding: 12px; border-radius: 12px; text-align: center;">
            <small style="color: #666; font-weight: 600; display: block; margin-bottom: 5px;">🔑 Código de Conexão:</small>
            
            <div style="display: inline-flex; align-items: center; background: var(--roxo); border-radius: 8px; overflow: hidden; margin: 5px auto;">
                <span id="textoCodigoFamiliar" style="color: white; font-family: monospace; font-size: 1.1rem; padding: 5px 12px; font-weight: bold; filter: blur(5px); transition: 0.3s; user-select: none;">${codigoFamiliar}</span>
                <button onclick="toggleCodigoFamiliar()" style="background: rgba(0,0,0,0.2); border: none; color: white; padding: 8px; cursor: pointer;">
                    <i id="iconeOlhoCodigo" class="fas fa-eye"></i>
                </button>
            </div>

            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,140,0,0.2);">
                <small style="color: #666; display: block; margin-bottom: 5px;">🔗 Link para o Explorador:</small>
                <input type="text" value="${linkAcesso}" readonly 
                    style="width: 100%; font-size: 0.7rem; padding: 5px; border: 1px solid #ddd; border-radius: 5px; text-align: center; background: white;">
                <button onclick="navigator.clipboard.writeText('${linkAcesso}').then(() => alert('Link copiado!'))"
                    style="background: none; border: none; color: var(--roxo); font-size: 0.75rem; font-weight: 700; cursor: pointer; margin-top: 5px;">
                    <i class="fas fa-copy"></i> Copiar Link
                </button>
            </div>
        </div>
    `;
                        // ===========================================

                        // Monitoramento Kids (simplificado)
                        const qKids = query(collection(db, "posts_circuito"), where("pai_uid", "==", user.uid), orderBy("data", "desc"));
                        onSnapshot(qKids, (snapshot) => {
                            const monitor = document.getElementById('monitorizacaoKids');
                            monitor.innerHTML = "";
                            if (snapshot.empty) monitor.innerHTML = "Nenhuma atividade recente.";
                            snapshot.forEach(doc => {
                                const p = doc.data();
                                monitor.innerHTML += `<div class="card" style="padding:10px; font-size:0.8rem; margin-bottom:10px; border:1px solid #eee;"><b>${p.autor}:</b> ${p.texto}</div>`;
                            });
                        });
                    }

                    carregarFeed(); // Chama o feed assim que logar
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // 2. FUNCIONAMENTO DA BARRA DO ORKUT
        const postContent = document.getElementById('postContent');
        document.getElementById('boldBtn').onclick = () => document.execCommand('bold', false, null);
        document.getElementById('italicBtn').onclick = () => document.execCommand('italic', false, null);
        document.getElementById('sizeSelect').onchange = (e) => document.execCommand('fontSize', false, e.target.value);
        document.getElementById('colorPicker').onchange = (e) => document.execCommand('foreColor', false, e.target.value);

        // Upload de Imagem na caixa de texto
        document.getElementById('imgBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.execCommand('insertImage', false, event.target.result);
                };
                reader.readAsDataURL(file);
            }
        };

        // 3. POSTAR NO FEED
        document.getElementById('btnPostar').onclick = async () => {
            const htmlContent = postContent.innerHTML.trim();
            if (!htmlContent || htmlContent === postContent.getAttribute('placeholder')) {
                return alert("Escreva algo antes de postar!");
            }

            try {
                await addDoc(collection(db, "posts_gerais"), {
                    texto: htmlContent,
                    autor: auth.currentUser.displayName,
                    fotoAutor: auth.currentUser.photoURL,
                    uid: auth.currentUser.uid,
                    data: serverTimestamp()
                });
                postContent.innerHTML = "";
            } catch (e) {
                console.error("Erro ao postar:", e);
                alert("Erro ao postar. Se persistir, aguarde o Firebase criar o Índice.");
            }
        };

        // 4. CARREGAR FEED E LIXEIRA INTELIGENTE
        function carregarFeed() {
            const qFeed = query(collection(db, "posts_gerais"), orderBy("data", "desc"));
            onSnapshot(qFeed, (snapshot) => {
                const feedPrincipal = document.getElementById('feedPrincipal');
                feedPrincipal.innerHTML = "";

                snapshot.forEach(docSnap => {
                    const post = docSnap.data();
                    const postId = docSnap.id;
                    const postDate = post.data ? post.data.toDate().toLocaleString('pt-BR') : 'agora mesmo';

                    const isDono = currentUserId === post.uid;
                    const classLixeira = isDono ? "btn-reaction delete-btn ativo" : "btn-reaction delete-btn";

                    const html = `
                        <div class="feed-item" id="post-${postId}">
                            <div class="feed-post-header">
                                <img src="${post.fotoAutor || 'https://via.placeholder.com/40'}" alt="Avatar">
                                <div class="author-info">
                                    <strong>${post.autor}</strong>
                                    <small>${postDate}</small>
                                </div>
                            </div>
                            <div style="color: #444; line-height: 1.5;">
                                ${post.texto}
                            </div>
                            <div class="post-actions">
                                <button class="btn-reaction" title="Amei!">❤️</button>
                                <button class="btn-reaction" title="Genial!">🧠</button>
                                <button class="btn-reaction" title="Favoritar">⭐</button>
                                
                                <button class="${classLixeira}" title="Excluir" onclick="deletarPost('${postId}')">🗑️</button>
                            </div>
                        </div>
                    `;
                    feedPrincipal.innerHTML += html;
                });
            });
        }

        // Função global de deletar
        window.deletarPost = async function (postId) {
            if (confirm("Tem certeza que deseja excluir esta memória?")) {
                await deleteDoc(doc(db, "posts_gerais", postId));
            }
        };
    </script>
</body>

</html>
