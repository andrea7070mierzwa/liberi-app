<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F8F9FD;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .layout-orkut {
            display: grid;
            grid-template-columns: 240px 1fr 260px;
            gap: 20px;
            max-width: 1200px;
            margin: 25px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
        }

        /* GATILHO DE CURIOSIDADE (ESTILO SORTE DO DIA) */
        .curiosidade-box {
            background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
            color: white;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
            cursor: pointer;
        }

        .curiosidade-box span {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .curiosidade-box p {
            font-size: 0.85rem;
            margin: 5px 0 0;
            line-height: 1.4;
            font-weight: 500;
        }

        /* GRADE DE AMIGOS (ESTILO ORKUT) */
        .amigos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .amigo-mini {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            object-fit: cover;
            background: #eee;
        }

        /* FEED COM TRAVA DE MEMBRO */
        .post-card {
            border-left: 4px solid var(--roxo);
            padding: 15px;
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .tag-comunidade {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--roxo);
            background: #F0EEFF;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .blur-content {
            filter: blur(4px);
            pointer-events: none;
            user-select: none;
        }

        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            flex-direction: column;
        }

        .btn-entrar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>

    <main class="layout-orkut">
        <aside>
            <div class="card" style="text-align: center;">
                <img id="userFoto" src=""
                    style="width: 80px; height: 80px; border-radius: 25px; border: 3px solid #FFF; box-shadow: 0 5px 10px rgba(0,0,0,0.05);">
                <strong id="userName"
                    style="display: block; margin-top: 10px; color: var(--roxo); font-size: 0.9rem;">...</strong>

                <div style="text-align: left; margin-top: 20px;">
                    <span style="font-size: 0.75rem; font-weight: 800; color: #AAA; text-transform: uppercase;">Meus
                        Amigos (9)</span>
                    <div class="amigos-grid" id="listaAmigosMini">
                    </div>
                </div>

                <div class="curiosidade-box" onclick="window.location.href='discussao.html?id=DICA_DIA'">
                    <span>Você sabia? 💡</span>
                    <p id="textoCuriosidade">O cérebro da criança aos 2 anos dobra de tamanho...</p>
                </div>
            </div>
        </aside>

        <section>
            <div class="card">
                <h2 style="font-size: 1rem; margin-bottom: 15px;">Atualizações da Vila</h2>
                <div id="feedHibrido">
                </div>
            </div>
        </section>

        <aside>
            <div class="card">
                <span style="font-size: 0.75rem; font-weight: 800; color: #AAA; text-transform: uppercase;">Minhas
                    Comunidades</span>
                <div id="minhasComunidades" style="margin-top: 15px;">
                    <p style="font-size: 0.8rem; color: #CCC;">Você ainda não participa de comunidades.</p>
                </div>
                <button onclick="window.location.href='comunidades.html'"
                    style="width: 100%; background: #F0EEFF; border: none; padding: 10px; border-radius: 12px; color: var(--roxo); font-weight: 700; font-size: 0.8rem; margin-top: 15px; cursor: pointer;">Explorar
                    Mais →</button>
            </div>
        </aside>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, query, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let minhasInscricoes = []; // IDs das comunidades que eu participo

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userFoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName;

                // 1. Carregar comunidades do usuário (Gaveta do Perfil)
                const userRef = doc(db, "usuarios", user.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) minhasInscricoes = userSnap.data().comunidades || [];

                carregarFeed();
                carregarMiniAmigos();
            } else { window.location.href = "index.html"; }
        });

        function carregarFeed() {
            const q = query(collection(db, "posts"), orderBy("data", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feedHibrido');
                feed.innerHTML = "";

                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const souMembro = post.comunidadeId ? minhasInscricoes.includes(post.comunidadeId) : true;

                    feed.insertAdjacentHTML('beforeend', `
                        <div class="post-card">
                            ${post.comunidadeNome ? `<span class="tag-comunidade">${post.comunidadeNome}</span>` : ''}
                            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                                <img src="${post.fotoAutor}" style="width: 25px; height: 25px; border-radius: 8px;">
                                <strong style="font-size: 0.85rem; color: var(--roxo);">${post.autor}</strong>
                            </div>
                            
                            <div class="${souMembro ? '' : 'blur-content'}">
                                <div style="font-size: 0.9rem; line-height: 1.5;">${post.texto.substring(0, 100)}...</div>
                            </div>

                            ${!souMembro ? `
                                <div class="lock-overlay">
                                    <span style="font-size: 0.8rem; font-weight: 700; color: #666;">Conteúdo exclusivo para membros</span>
                                    <button class="btn-entrar" onclick="window.location.href='grupos.html?id=${post.comunidadeId}'">Participar da Comunidade</button>
                                </div>
                            ` : `
                                <a href="discussao.html?id=${docSnap.id}" style="color: var(--roxo); font-size: 0.75rem; font-weight: 700; text-decoration: none; display: block; margin-top: 10px;">LER TUDO →</a>
                            `}
                        </div>
                    `);
                });
            });
        }

        function carregarMiniAmigos() {
            const grid = document.getElementById('listaAmigosMini');
            // Aqui você buscaria na coleção "amigos", mas vamos simular 6 fotos para o visual Orkut
            for (let i = 0; i < 6; i++) {
                grid.innerHTML += `<img src="https://i.pravatar.cc/100?u=${i}" class="amigo-mini">`;
            }
        }
    </script>
</body>

</html>
