<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .layout-geral {
            display: grid;
            grid-template-columns: 240px 1fr 260px;
            gap: 20px;
            max-width: 1200px;
            margin: 25px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.04);
            margin-bottom: 20px;
        }

        /* AJUSTE DE FONTES */
        h2,
        h3 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            margin-top: 0;
            font-size: 1.2rem;
        }

        .nome-user {
            font-family: 'Plus Jakarta Sans';
            font-weight: 800;
            color: var(--roxo);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .foto-perfil {
            width: 90px;
            height: 90px;
            border-radius: 25px;
            object-fit: cover;
            margin-bottom: 10px;
            border: 3px solid #F0EEFF;
        }

        /* EDITOR CLEAN */
        .area-escrita {
            position: relative;
        }

        #campoPost {
            width: 100%;
            border: none;
            background: #F8F7FF;
            border-radius: 15px;
            padding: 15px;
            font-family: 'Poppins';
            font-size: 0.95rem;
            min-height: 120px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        #campoPost:focus {
            background: white;
            box-shadow: inset 0 0 0 2px var(--roxo);
        }

        /* BARRA DE FERRAMENTAS ESCONDIDA */
        .controles-post {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .toolbar-oculta {
            display: none;
            align-items: center;
            gap: 8px;
            background: #eee8ff;
            padding: 8px 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-toggle-tools {
            background: #f0eeff;
            border: none;
            color: var(--roxo);
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn-tool {
            background: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .input-cor {
            border: none;
            width: 25px;
            height: 25px;
            cursor: pointer;
            background: none;
        }

        .btn-postar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* FEED */
        .post-card {
            border-left: 5px solid var(--roxo);
            padding: 15px;
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .post-conteudo {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .post-conteudo img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .link-comentarios {
            color: var(--roxo);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <main class="layout-geral">
        <aside>
            <div class="card" style="text-align: center;">
                <img id="userFoto" src="" class="foto-perfil">
                <span id="userName" class="nome-user">...</span>
                <hr style="border: 0; border-top: 1px solid #f0eeff; margin: 15px 0;">
                <button
                    style="background: none; border: none; color: #666; cursor: pointer; font-weight: 600; font-size: 0.85rem;"
                    onclick="window.location.href='perfil.html'">👤 Meu Perfil</button>
            </div>
        </aside>

        <section>
            <div class="card">
                <h2>Criar Postagem ✨</h2>

                <div class="area-escrita">
                    <div id="campoPost" contenteditable="true" placeholder="O que você quer compartilhar?"></div>
                </div>

                <div class="controles-post">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button class="btn-toggle-tools" onclick="toggleTools()" title="Formatar texto">🎨</button>

                        <div id="minhaToolbar" class="toolbar-oculta">
                            <button class="btn-tool" onclick="formatar('bold')">B</button>
                            <button class="btn-tool" onclick="formatar('italic')">I</button>
                            <input type="color" class="input-cor" onchange="mudarCor(this.value)">
                            <button class="btn-tool" onclick="inserirImagem()">🖼️</button>
                        </div>
                    </div>

                    <button id="btnPostar" class="btn-postar">Publicar Post</button>
                </div>
            </div>
            <div id="feedPosts"></div>
        </section>

        <aside>
            <div class="card">
                <h3>🔍 Comunidades</h3>
                <button onclick="window.location.href='comunidades.html'"
                    style="background: var(--bg); border: none; color: var(--roxo); padding: 10px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; font-size: 0.85rem;">Explorar
                    Vila →</button>
            </div>
        </aside>
    </main>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Toggle da Toolbar
        window.toggleTools = () => {
            const bar = document.getElementById('minhaToolbar');
            bar.style.display = bar.style.display === 'flex' ? 'none' : 'flex';
        };

        window.formatar = (cmd) => { document.execCommand(cmd, false, null); document.getElementById('campoPost').focus(); };
        window.mudarCor = (cor) => { document.execCommand('foreColor', false, cor); document.getElementById('campoPost').focus(); };
        window.inserirImagem = () => {
            const url = prompt("Link da imagem:");
            if (url) document.execCommand('insertImage', false, url);
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userFoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName;
                carregarFeed();
            } else { window.location.href = "index.html"; }
        });

        function carregarFeed() {
            const q = query(collection(db, "posts"), orderBy("data", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feedPosts');
                feed.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const eDono = auth.currentUser && (post.autorId === auth.currentUser.uid || auth.currentUser.email === "seu-email@gmail.com");

                    feed.insertAdjacentHTML('beforeend', `
                        <div class="post-card">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <img src="${post.fotoAutor}" style="width: 25px; height: 25px; border-radius: 8px;">
                                    <strong style="color: #6C5CE7; font-size: 0.85rem;">${post.autor}</strong>
                                </div>
                                ${eDono ? `<button onclick="window.excluirPost('${docSnap.id}')" style="background:none; border:none; color:#ccc; cursor:pointer; font-size:0.7rem;">Apagar</button>` : ''}
                            </div>
                            <div class="post-conteudo">${post.texto}</div>
                            <a href="discussao.html?id=${docSnap.id}" class="link-comentarios" style="display:block; margin-top:10px;">💬 Comentários</a>
                        </div>`);
                });
            });
        }

        window.excluirPost = async (id) => { if (confirm("Apagar?")) await deleteDoc(doc(db, "posts", id)); };

        document.getElementById('btnPostar').onclick = async () => {
            const campo = document.getElementById('campoPost');
            if (!campo.innerHTML.trim() || campo.innerHTML === "<br>") return;
            await addDoc(collection(db, "posts"), {
                texto: campo.innerHTML,
                autor: auth.currentUser.displayName,
                fotoAutor: auth.currentUser.photoURL,
                autorId: auth.currentUser.uid,
                data: serverTimestamp()
            });
            campo.innerHTML = "";
            document.getElementById('minhaToolbar').style.display = 'none'; // Esconde após postar
        };
    </script>
</body>

</html>
