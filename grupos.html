<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Tópicos do Grupo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --branco: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .cabecalho-grupo {
            background: var(--roxo);
            color: white;
            padding: 40px;
            border-radius: 30px;
            margin-bottom: 30px;
        }

        .cabecalho-grupo h1 {
            font-family: 'Plus Jakarta Sans';
            margin: 0;
            font-size: 2rem;
        }

        /* LISTA DE TÓPICOS */
        .card-topico {
            background: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
            border-left: 6px solid transparent;
        }

        .card-topico:hover {
            border-left-color: var(--roxo);
            transform: translateX(5px);
        }

        .titulo-topico {
            font-family: 'Plus Jakarta Sans';
            font-weight: 700;
            color: var(--roxo);
            font-size: 1.1rem;
            margin-bottom: 5px;
            display: block;
        }

        /* MODAL E EDITOR */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 600px;
        }

        .input-padrao {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 15px;
            font-family: 'Poppins';
            box-sizing: border-box;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            background: #f8f7ff;
            padding: 10px;
            border-radius: 12px;
        }

        .btn-tool {
            background: white;
            border: 1px solid #ddd;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-cor {
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
        }

        #editorTexto {
            width: 100%;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 15px;
            min-height: 200px;
            outline: none;
            background: #fafafa;
            box-sizing: border-box;
        }

        #editorTexto:focus {
            border-color: var(--roxo);
            background: white;
        }

        .btn-acao {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--roxo);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>

<body>

    <script type="module" src="menu.js"></script>

    <div class="container">
        <div class="cabecalho-grupo">
            <span id="nomeComunidade"
                style="font-size: 0.9rem; opacity: 0.8; text-transform: uppercase;">Comunidade</span>
            <h1 id="tituloGrupo">Carregando...</h1>
        </div>

        <div id="listaTopicos"></div>
    </div>

    <button class="btn-add" onclick="abrirModal()">+</button>

    <div class="modal" id="modalPost">
        <div class="modal-content">
            <h2 style="font-family: 'Plus Jakarta Sans'; color: var(--roxo); margin-top: 0;">Novo Tópico</h2>

            <input type="text" id="inputTitulo" class="input-padrao"
                placeholder="Título do Tópico (Ficará no padrão Líberi)">

            <div class="toolbar">
                <button class="btn-tool" onclick="formatar('bold')">B</button>
                <button class="btn-tool" onclick="formatar('italic')">I</button>
                <input type="color" class="input-cor" id="corTexto" onchange="mudarCor(this.value)">
                <button class="btn-tool" onclick="inserirImagem()" style="margin-left: auto;">🖼️ Imagem</button>
            </div>

            <div id="editorTexto" contenteditable="true"></div>

            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-acao" style="background: #eee; color: #666;"
                    onclick="fecharModal()">Cancelar</button>
                <button class="btn-acao" id="btnPublicar">Publicar ✨</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const grupoId = urlParams.get('grupo');

        // Editor
        window.formatar = (cmd) => { document.execCommand(cmd, false, null); document.getElementById('editorTexto').focus(); };
        window.mudarCor = (cor) => { document.execCommand('foreColor', false, cor); document.getElementById('editorTexto').focus(); };
        window.inserirImagem = () => {
            const url = prompt("Link da imagem:");
            if (url) document.execCommand('insertImage', false, url);
        };

        window.abrirModal = () => document.getElementById('modalPost').style.display = 'flex';
        window.fecharModal = () => document.getElementById('modalPost').style.display = 'none';

        onAuthStateChanged(auth, (user) => {
            if (user && grupoId) {
                document.getElementById('tituloGrupo').innerText = "Tópicos de Discussão";
                carregarTopicos();
            } else { window.location.href = "index.html"; }
        });

        function carregarTopicos() {
            const q = query(collection(db, "posts"), orderBy("data", "desc")); // Usando a mesma coleção centralizada
            onSnapshot(q, (snapshot) => {
                const lista = document.getElementById('listaTopicos');
                lista.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const t = docSnap.data();
                    lista.insertAdjacentHTML('beforeend', `
                        <a href="discussao.html?id=${docSnap.id}" class="card-topico">
                            <div>
                                <span class="titulo-topico">${t.titulo || 'Postagem da Comunidade'}</span>
                                <small>Por: ${t.autor}</small>
                            </div>
                            <span style="color: var(--roxo); font-weight: bold;">→</span>
                        </a>
                    `);
                });
            });
        }

        document.getElementById('btnPublicar').onclick = async () => {
            const titulo = document.getElementById('inputTitulo').value;
            const campo = document.getElementById('editorTexto');

            if (!titulo || !campo.innerHTML.trim()) return alert("Preencha o título e o conteúdo!");

            await addDoc(collection(db, "posts"), {
                titulo: titulo, // Título padronizado
                texto: campo.innerHTML, // Texto livre e colorido
                autor: auth.currentUser.displayName,
                fotoAutor: auth.currentUser.photoURL,
                autorId: auth.currentUser.uid,
                data: serverTimestamp()
            });

            fecharModal();
            campo.innerHTML = "";
            document.getElementById('inputTitulo').value = "";
        };
    </script>
</body>

</html>
