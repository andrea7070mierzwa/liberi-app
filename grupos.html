<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Grupos da Comunidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500&family=Sora:wght@600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --branco: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        header {
            background: var(--roxo);
            padding: 15px 5%;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .layout-main {
            display: grid;
            grid-template-columns: 280px 1fr;
            max-width: 1200px;
            margin: 30px auto;
            gap: 30px;
            padding: 0 20px;
        }

        /* BARRA LATERAL (GRUPOS) */
        .sidebar {
            background: var(--branco);
            padding: 25px;
            border-radius: 24px;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .item-grupo {
            display: block;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            text-decoration: none;
            color: #666;
            transition: 0.3s;
        }

        .item-grupo:hover,
        .item-grupo.active {
            background: var(--bg);
            color: var(--roxo);
            font-weight: 600;
        }

        /* ÁREA DE CONTEÚDO (FEED/ÍNDICE) */
        .feed-container {
            background: var(--branco);
            padding: 35px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--bg);
            color: var(--roxo);
            font-family: 'Sora';
            font-size: 0.9rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f9f9f9;
            font-size: 0.95rem;
        }

        .link-topico {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        .link-topico:hover {
            color: var(--roxo);
        }

        .btn-postar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 14px;
            cursor: pointer;
            font-family: 'Sora';
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-postar:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        /* MODAL SIMPLES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Poppins';
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="layout-main">
        <aside class="sidebar">
            <h3 style="font-family: 'Plus Jakarta Sans'; font-size: 1.1rem; margin-top:0;">Grupos</h3>
            <div id="listaGrupos">
                <p style="font-size: 0.8rem; color: #999;">Carregando grupos...</p>
            </div>
        </aside>

        <main class="feed-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="tituloGrupoAtual" style="font-family: 'Plus Jakarta Sans'; margin:0;">Início</h2>
                <button class="btn-postar" onclick="abrirModal()">+ Nova Postagem</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th width="60%">Tópico de Conversa</th>
                        <th>Autora</th>
                        <th style="text-align: center;">Respostas</th>
                    </tr>
                </thead>
                <tbody id="corpoIndice">
                </tbody>
            </table>
        </main>
    </div>

    <div id="modalPost" class="modal">
        <div class="modal-content">
            <h3 style="font-family: 'Plus Jakarta Sans'; color: var(--roxo); margin-top:0;">Criar Nova Postagem</h3>
            <input type="text" id="inputTitulo" placeholder="Título da conversa">
            <textarea id="inputTexto" rows="5" placeholder="O que você quer compartilhar com o grupo?"></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn-postar" id="btnSalvarPost" style="flex: 2;">Publicar</button>
                <button class="btn-postar" onclick="fecharModal()" style="background:#ccc; flex: 1;">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, addDoc, doc, getDoc, getDocs, query, orderBy, onSnapshot, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Identificar onde estamos
        const params = new URLSearchParams(window.location.search);
        const idComu = params.get('comu') || 'maes40'; // Fallback para maes40 se der erro

        // 2. Carregar Nome da Comunidade e Grupos
        async function setupPagina() {
            const comuSnap = await getDoc(doc(db, "comunidades", idComu));
            if (comuSnap.exists()) {
                document.getElementById('nomeComunidade').innerText = "Líberi - " + comuSnap.data().nome;
            }

            // Listar grupos (ex: Geral, Dicas, Desabafos)
            const gruposSnap = await getDocs(collection(db, "comunidades", idComu, "grupos"));
            const divGrupos = document.getElementById('listaGrupos');
            divGrupos.innerHTML = "";

            gruposSnap.forEach(gDoc => {
                const g = gDoc.data();
                divGrupos.innerHTML += `<a href="#" class="item-grupo" onclick="carregarTopicos('${gDoc.id}', '${g.nome}')">${g.nome}</a>`;
            });

            // Carrega o primeiro grupo por padrão (geralmente o 'geral')
            carregarTopicos('geral', 'Início');
        }

        // 3. CARREGAR TÓPICOS (O Feed Dinâmico)
        window.carregarTopicos = (idGrupo, nomeGrupo) => {
            document.getElementById('tituloGrupoAtual').innerText = nomeGrupo;

            const q = query(collection(db, `comunidades/${idComu}/grupos/${idGrupo}/topicos`), orderBy("data", "desc"));

            onSnapshot(q, (snap) => {
                const tabela = document.getElementById('corpoIndice');
                tabela.innerHTML = "";
                snap.forEach(tDoc => {
                    const t = tDoc.data();
                    tabela.innerHTML += `
                        <tr>
                            <td><a href="topico.html?comu=${idComu}&grupo=${idGrupo}&id=${tDoc.id}" class="link-topico">${t.titulo}</a></td>
                            <td style="color:#666; font-size:0.85rem;">${t.autor}</td>
                            <td align="center"><span style="background:var(--bg); padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:bold; color:var(--roxo);">${t.respostas || 0}</span></td>
                        </tr>`;
                });
            });

            // Salva o grupo atual no botão de postar
            document.getElementById('btnSalvarPost').onclick = () => realizarPostagem(idGrupo);
        };

        // 4. REALIZAR POSTAGEM (CONTADOR +1)
        async function realizarPostagem(idGrupo) {
            const titulo = document.getElementById('inputTitulo').value;
            const texto = document.getElementById('inputTexto').value;
            const user = auth.currentUser;

            if (!titulo || !texto || !user) return alert("Verifique se preencheu tudo e se está logada!");

            try {
                // Criar Tópico
                await addDoc(collection(db, `comunidades/${idComu}/grupos/${idGrupo}/topicos`), {
                    titulo, texto,
                    autor: user.displayName || "Mãe Líberi",
                    autorId: user.uid,
                    data: serverTimestamp(),
                    respostas: 0
                });

                // ATUALIZAR CONTADOR NO PERFIL
                await updateDoc(doc(db, "usuarios", user.uid), {
                    postagens: increment(1)
                });

                fecharModal();
                alert("Postagem publicada com sucesso! ✨");
            } catch (e) { console.error(e); }
        }

        // Modais
        window.abrirModal = () => document.getElementById('modalPost').style.display = 'flex';
        window.fecharModal = () => document.getElementById('modalPost').style.display = 'none';

        setupPagina();
    </script>
    <script src="menu.js"></script>
</body>

</html>
