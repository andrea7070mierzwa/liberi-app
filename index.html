<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: white;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            color: #777;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-google {
            background: var(--roxo);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
            font-family: 'Poppins';
        }

        .btn-google:hover {
            transform: translateY(-4px);
            background: #5649c0;
        }
    </style>
</head>

<body>

    <main class="login-card">
        <h1>Líberi</h1>
        <p>Conectando famílias e fortalecendo a comunidade parental.</p>
        <button class="btn-google" id="btnLogar">Entrar com Google</button>
    </main>

    <script type="module">
        import { auth, provider, db } from "./liberi.js";
        import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btnLogar').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Referência do usuário no Firestore
                const userRef = doc(db, "usuarios", user.uid);
                const userSnap = await getDoc(userRef);

                // Se o usuário não existir no banco, criamos o perfil básico dele agora
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        nome: user.displayName,
                        email: user.email,
                        foto: user.photoURL,
                        dataCadastro: new Date().toISOString()
                    });
                }

                // Redirecionamento direto para o Perfil, sem passar por cadastro de filhos
                window.location.href = "perfil.html";

            } catch (error) {
                console.error("Erro no login:", error);
                alert("Ops! Ocorreu um erro ao entrar. Verifique sua conexão.");
            }
        };
    </script>
</body>

</html>
