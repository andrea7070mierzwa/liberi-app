<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeurUp | Entrar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --roxo: #5848d0;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(88, 72, 208, 0.1);
            width: 100%;
            max-width: 380px;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h2 {
            color: var(--roxo);
            font-family: 'Plus Jakarta Sans';
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 2px solid #f0eeff;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--roxo);
        }

        .btn-entrar {
            background: var(--roxo);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .divisor {
            margin: 20px 0;
            color: #aaa;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .divisor::before,
        .divisor::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .btn-google {
            background: #fff;
            border: 2px solid #eee;
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-google:hover {
            background: #fafafa;
        }

        /* =========================================
           📱 MUTIRÃO MOBILE - RESPONSIVIDADE
           ========================================= */
        @media (max-width: 768px) {

            /* 1. Ajusta o respiro lateral para ganhar espaço na telinha */
            .main-content,
            .container {
                padding: 20px 5%;
            }

            /* 2. Centraliza e diminui os títulos para não quebrarem de linha feio */
            h1 {
                font-size: 1.8rem;
                text-align: center;
            }

            /* 3. Coloca os cards de Comunidade um embaixo do outro (1 coluna só) */
            .grid-comunidades {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            /* 4. Ajusta a barra de ferramentas do Mural para os botões não vazarem */
            .toolbar {
                justify-content: center;
                padding: 10px;
            }

            .toolbar button,
            .toolbar select {
                padding: 6px 10px;
                font-size: 0.9rem;
            }

            /* 5. Deixa a área de texto do recado mais compacta */
            .editor-area {
                min-height: 120px;
                padding: 15px;
                font-size: 1rem;
            }

            /* 6. Encolhe um pouquinho o botão flutuante de Criar Comunidade (+) */
            button[onclick*="modalCriar"] {
                width: 50px !important;
                height: 50px !important;
                bottom: 20px !important;
                right: 20px !important;
                font-size: 24px !important;
            }

            /* 7. Ajusta o Pop-up de criação para caber perfeitamente no meio do celular */
            #modalCriar>div {
                width: 85% !important;
                padding: 20px !important;
            }

            /* 8. Botão de postar no mural ocupa a largura toda para ficar fácil de clicar com o dedão */
            .btn-postar {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="imagens/logo.png" alt="Logo NeurUp" class="logo">
        <h2>Entre, a casa é sua!</h2>

        <input type="email" id="emailInput" placeholder="Seu e-mail">
        <input type="password" id="senhaInput" placeholder="Sua senha">
        <button class="btn-entrar" id="btnEntrarEmail">Entrar na NeurUp</button>

        <div class="divisor">ou</div>

        <button class="btn-google" id="btnLoginGoogle">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Entrar com Google
        </button>

        <p style="margin-top: 25px; font-size: 0.85rem; color: #888;">
            É um jovem explorador? <a href="login_explorador.html"
                style="color: var(--roxo); font-weight: 700; text-decoration: none;">Crie sua conta aqui</a>
        </p>
    </div>

    <script type="module">
        import { auth, db } from './liberi.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const provider = new GoogleAuthProvider();

        // FUNÇÃO DE DIRECIONAMENTO (O CORREDOR INTELIGENTE)
        async function direcionarUsuario(user) {
            const docSnap = await getDoc(doc(db, "usuarios", user.uid));
            const d = docSnap.exists() ? docSnap.data() : null;

            if (d && d.tipo === "dependente_autonomo") {
                window.location.href = "neura_kids.html"; // Jovem vai para o Circuito
            } else {
                window.location.href = "dashboard.html"; // Responsável vai para o Painel
            }
        }

        // LOGIN POR E-MAIL E SENHA
        document.getElementById('btnEntrarEmail').onclick = async () => {
            const email = document.getElementById('emailInput').value;
            const senha = document.getElementById('senhaInput').value;
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, senha);
                direcionarUsuario(userCredential.user);
            } catch (error) {
                alert("E-mail ou senha inválidos.");
            }
        };

        // LOGIN POR GOOGLE (PAIS)
        document.getElementById('btnLoginGoogle').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                direcionarUsuario(result.user);
            } catch (error) {
                console.error(error);
            }
        };
    </script>
</body>

</html>
