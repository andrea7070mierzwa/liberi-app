<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Patrocinador posicionado fixo no topo */
        .patrocinador-topo {
            position: fixed;
            top: 20px;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            font-size: 0.85rem;
            color: #666;
            z-index: 10;
        }

        .login-card {
            background: white;
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(108, 92, 231, 0.15);
            text-align: center;
            max-width: 420px;
            width: 85%;
            z-index: 5;
        }

        h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            font-size: 2.8rem;
            margin: 0 0 10px;
            letter-spacing: -2px;
        }

        p {
            color: #777;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .btn-google {
            background: var(--roxo);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
            font-family: 'Poppins';
        }

        .btn-google:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.4);
            background: #5649c0;
        }
    </style>
</head>

<body>

    <div class="patrocinador-topo">
        ✨ Patrocinador Master: Marcas que cuidam da infância
    </div>

    <main class="login-card">
        <h1>Líberi</h1>
        <p>Conectando famílias, compartilhando experiências e fortalecendo a comunidade parental.</p>
        <button class="btn-google" id="btnLogar">Entrar com Google</button>
    </main>

    <script type="module">
        import { auth, provider } from "./liberi.js";
        import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.getElementById('btnLogar').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "comunidades.html";
            } catch (error) {
                console.error("Erro ao logar:", error);
            }
        };
    </script>
</body>

</html>
