<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Bem-vinda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Ocupa a tela toda */
            align-items: center;
            justify-content: center;
            /* Centraliza o card no meio */
        }

        .patrocinador-topo {
            position: absolute;
            top: 20px;
            font-size: 0.85rem;
            color: #777;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
        }

        .login-card {
            background: white;
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(108, 92, 231, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 40px;
        }

        .btn-google {
            background: var(--roxo);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }

        .btn-google:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.3);
        }
    </style>
</head>

<body>

    <div class="patrocinador-topo">
        ✨ Patrocinador Master: Espaço para marcas que cuidam da infância
    </div>

    <main class="login-card">
        <h1>Líberi</h1>
        <p>Sua vila digital, segura e anônima.</p>
        <button class="btn-google" id="btnLogar">Entrar com Google</button>
    </main>

    <script type="module">
        import { auth, provider } from "./liberi.js";
        import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.getElementById('btnLogar').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "comunidades.html";
            } catch (error) {
                console.error("Erro ao logar:", error);
            }
        };
    </script>
    <script type="module" src="menu.js"></script>
</body>

</html>
