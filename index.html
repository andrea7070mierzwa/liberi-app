<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeurUp - Bem-vinda à Rede</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #5848d0;
            --laranja: #FF8C00;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(88, 72, 208, 0.1);
        }

        h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 span {
            color: var(--laranja);
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-google {
            background: var(--roxo);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-google:hover {
            transform: translateY(-4px);
            background: #4639a7;
        }
    </style>
</head>

<body>
    <main class="login-card">
        <h1>Neur<span>Up</span></h1>
        <p>Neurociência e afeto para impulsionar o desenvolvimento do seu filho.</p>
        <button class="btn-google" id="btnLogar">Entrar com Google</button>
    </main>

    <script type="module">
        // IMPORTANTE: Verifique se o arquivo se chama neurup.js ou liberi.js
        import { auth, provider, db } from "./liberi.js";
        import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btnLogar').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "usuarios", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    // Primeiro cadastro: salva o básico
                    await setDoc(userRef, {
                        nome: user.displayName,
                        email: user.email,
                        foto: user.photoURL,
                        dataCadastro: new Date().toISOString()
                    });
                }
                // Vai para o perfil para completar idade do filho e preferências
                window.location.href = "perfil.html";
            } catch (error) {
                console.error("Erro no login:", error);
                alert("Ops! Erro ao conectar com o NeurUp. Verifique se o domínio está autorizado no Firebase.");
            }
        };
    </script>
</body>

</html>
