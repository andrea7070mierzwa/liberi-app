<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeurUp - Conversa</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #5848d0;
            --bg: #F0EEFF;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .container-discussao {
            max-width: 750px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card-post-foco {
            background: var(--card);
            padding: 30px;
            border-radius: 30px;
            border-left: 8px solid var(--roxo);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        .foto-autor {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            object-fit: cover;
        }

        .nome-autor {
            font-weight: 700;
            color: var(--roxo);
        }

        #listaComentarios {
            margin-top: 30px;
        }

        .comentario-item {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        #textoComentario {
            width: 100%;
            min-height: 80px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            outline: none;
            border: 2px solid #EEE;
            margin-bottom: 10px;
        }

        .btn-comentar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <div class="container-discussao">
        <div id="postFoco" class="card-post-foco">
        </div>

        <div class="editor-coment">
            <div id="textoComentario" contenteditable="true" placeholder="Escreva seu apoio ou dúvida..."></div>
            <button id="btnEnviarComentario" class="btn-comentar">Enviar Comentário</button>
        </div>

        <div id="listaComentarios"></div>
    </div>

    <script type="module">
        import { db, auth, doc, getDoc, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp, deleteDoc } from "./liberi.js";

        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');

        // Carrega o Post Principal
        onSnapshot(doc(db, "posts", postId), (snap) => {
            if (!snap.exists()) return;
            const p = snap.data();
            document.getElementById('postFoco').innerHTML = `
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                    <img src="${p.fotoAutor}" class="foto-autor">
                    <span class="nome-autor">${p.autor}</span>
                </div>
                <div style="font-size:1.1rem; line-height:1.6;">${p.texto}</div>
            `;
        });

        // Carrega Comentários
        onSnapshot(query(collection(db, "comentarios"), where("postId", "==", postId), orderBy("data", "asc")), (snap) => {
            const lista = document.getElementById('listaComentarios');
            lista.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                lista.insertAdjacentHTML('beforeend', `
                    <div class="comentario-item">
                        <small><b>${c.autor}:</b></small>
                        <div style="margin-top:5px;">${c.texto}</div>
                    </div>
                `);
            });
        });

        document.getElementById('btnEnviarComentario').onclick = async () => {
            const campo = document.getElementById('textoComentario');
            if (!campo.innerText.trim()) return;
            await addDoc(collection(db, "comentarios"), {
                postId: postId,
                texto: campo.innerHTML,
                autor: auth.currentUser.displayName,
                autorId: auth.currentUser.uid,
                data: serverTimestamp()
            });
            campo.innerHTML = "";
        };
    </script>
</body>

</html>
