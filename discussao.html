<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Conversa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card-post {
            background: white;
            padding: 25px;
            border-radius: 25px;
            border-left: 8px solid var(--roxo);
            margin-bottom: 20px;
        }

        .card-comentario {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .area-responder {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
        }

        textarea {
            border: none;
            background: #F8F7FF;
            padding: 15px;
            border-radius: 15px;
            resize: none;
            margin-bottom: 10px;
        }

        .btn {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            align-self: flex-end;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="dashboard.html" style="text-decoration:none; color:var(--roxo)">← Voltar</a>
        <div id="postOriginal" class="card-post">Carregando...</div>
        <div id="listaComentarios"></div>
        <div class="area-responder">
            <textarea id="textoResposta" placeholder="Dê seu apoio..."></textarea>
            <button id="btnResponder" class="btn">Responder ✨</button>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { doc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const topicoId = new URLSearchParams(window.location.search).get('id');

        async function carregarPost() {
            const snap = await getDoc(doc(db, "topicos", topicoId));
            if (snap.exists()) {
                const p = snap.data();
                document.getElementById('postOriginal').innerHTML = `<strong>${p.autor}</strong><p>${p.texto}</p>`;
            }
        }

        function carregarComentarios() {
            const q = query(collection(db, "comentarios"), where("topicoId", "==", topicoId), orderBy("data", "asc"));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('listaComentarios');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    const eDono = auth.currentUser && c.autorId === auth.currentUser.uid;
                    lista.insertAdjacentHTML('beforeend', `
                        <div class="card-comentario">
                            <div style="display:flex; justify-content:space-between">
                                <strong>${c.autor}</strong>
                                ${eDono ? `<button onclick="window.apagarComent('${d.id}')" style="border:none; background:none; cursor:pointer">🗑️</button>` : ''}
                            </div>
                            <p>${c.texto}</p>
                        </div>`);
                });
            });
        }

        window.apagarComent = async (id) => { if (confirm("Apagar?")) await deleteDoc(doc(db, "comentarios", id)); };

        document.getElementById('btnResponder').onclick = async () => {
            const campo = document.getElementById('textoResposta');
            if (!campo.value) return;
            await addDoc(collection(db, "comentarios"), {
                topicoId, texto: campo.value, autor: auth.currentUser.displayName,
                autorId: auth.currentUser.uid, fotoAutor: auth.currentUser.photoURL, data: serverTimestamp()
            });
            campo.value = "";
        };

        carregarPost(); carregarComentarios();
    </script>
</body>

</html>
