<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Painel NeurUp - Injeção de Conhecimento</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #5848d0;
            --bg: #F8F9FD;
            --laranja: #FF8C00;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-card {
            background: white;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
        }

        textarea {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            border: 2px solid #EEE;
            padding: 15px;
            font-family: monospace;
            outline: none;
        }

        .btn-injetar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        #status {
            margin-top: 15px;
            font-weight: 600;
            color: var(--laranja);
        }
    </style>
</head>

<body>
    <div class="admin-card">
        <h1>Injetor <span>NeurUp</span> 🦉</h1>
        <p>Cole aqui os blocos JSON gerados pelo robô.</p>
        <textarea id="jsonInput" placeholder='[{ "id": "901", ... }]'></textarea>
        <div id="status">Aguardando novo lote...</div>
        <button class="btn-injetar" id="btnInjetar">Injetar Sabedoria na Rede</button>
    </div>

    <script type="module">
        import { db, doc, setDoc, serverTimestamp } from "./liberi.js";

        document.getElementById('btnInjetar').onclick = async () => {
            const input = document.getElementById('jsonInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('btnInjetar');

            if (!input.value.trim()) return alert("O campo está vazio, Andrea!");

            try {
                const dados = JSON.parse(input.value);
                btn.disabled = true;
                btn.innerText = "Processando...";

                let cont = 0;
                for (const item of dados) {
                    const docId = item.id ? item.id.toString() : `auto_${Date.now()}_${cont}`;
                    await setDoc(doc(db, "neuras_conhecimento", docId), {
                        ...item,
                        fonte: item.fonte || "Conexão NeurUp",
                        criadoEm: serverTimestamp()
                    });
                    cont++;
                    status.innerText = `✅ Processando: ${cont} de ${dados.length}...`;
                }

                status.innerText = `🏁 Pronto! ${cont} novos cards injetados com sucesso.`;
            } catch (e) {
                alert("Erro no JSON! Verifique se copiou o bloco completo.");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "Injetar outro Lote";
            }
        };
    </script>
</body>

</html>
