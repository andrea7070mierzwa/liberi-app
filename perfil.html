<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Líberi - Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #F0EEFF;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .foto {
            width: 120px;
            height: 120px;
            border-radius: 40px;
            border: 5px solid #EBE8FF;
            object-fit: cover;
        }

        h2 {
            color: #6C5CE7;
        }

        .bio {
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <img id="uFoto" src="" class="foto">
        <h2 id="uNome">...</h2>
        <p class="bio">Acreditando no poder da coletividade para educar e crescer. Pai, parceiro e aprendiz. 🌿</p>
        <button onclick="window.location.href='dashboard.html'"
            style="background:#6C5CE7; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer">Voltar
            para a Vila</button>
    </div>

    <script type="module">
        import { auth } from "./liberi.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('uNome').innerText = user.displayName;
                document.getElementById('uFoto').src = user.photoURL;
            }
        });
    </script>
</body>

</html>
