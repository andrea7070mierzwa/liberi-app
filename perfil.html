<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Perfil Integrado</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F8F9FD;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #4A4A4A;
        }

        .container-perfil {
            max-width: 650px;
            margin: 40px auto;
            padding: 20px;
        }

        .card-perfil {
            background: var(--card);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(108, 92, 231, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 40px;
            object-fit: cover;
            border: 4px solid #FFF;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            margin-top: -85px;
        }

        h2 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            margin: 15px 0 5px;
            font-weight: 800;
            font-size: 1.5rem;
        }

        .tag-perfil {
            background: #F0EEFF;
            color: var(--roxo);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .secao-familia {
            background: #F4F6FB;
            border-radius: 24px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }

        .titulo-secao {
            font-family: 'Plus Jakarta Sans';
            font-size: 0.8rem;
            color: #AAA;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
            font-weight: 700;
        }

        .filho-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 8px;
        }

        .tag-neuro {
            background: #FFF4E5;
            color: #FF9F43;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: 5px;
        }

        .btn-voltar {
            background: var(--roxo);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <script type="module" src="menu.js"></script>
    <div class="container-perfil">
        <div style="height: 100px;"></div>
        <div class="card-perfil">
            <img id="userFoto" src="" class="foto-perfil">
            <h2 id="userName">Carregando...</h2>
            <span class="tag-perfil">Sincronizado com Neuras 🧠</span>
            <div class="secao-familia">
                <span class="titulo-secao">Membros da Família</span>
                <div id="listaFilhos">
                    <p style="font-size: 0.8rem; color: #bbb; text-align: center;">Buscando dados no Neuras...</p>
                </div>
            </div>
            <button class="btn-voltar" onclick="window.location.href='dashboard.html'">Voltar para a Vila</button>
        </div>
    </div>
    <script type="module">
        import { db, auth } from "./liberi.js";
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userFoto').src = user.photoURL;
                onSnapshot(doc(db, "usuarios", user.uid), (snap) => {
                    const container = document.getElementById('listaFilhos');
                    if (snap.exists() && snap.data().filhos) {
                        container.innerHTML = "";
                        snap.data().filhos.forEach(f => {
                            container.insertAdjacentHTML('beforeend', `<div class="filho-card"><strong>${f.apelido} ${f.neuroatipico ? '<span class="tag-neuro">Neuroatípico</span>' : ''}</strong></div>`);
                        });
                    } else { container.innerHTML = '<p style="font-size: 0.8rem; color: #bbb; text-align: center;">Nenhum dado encontrado.</p>'; }
                });
            } else { window.location.href = "index.html"; }
        });
    </script>
</body>

</html>
