<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>NeurUp - Admin Geral</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #5848d0;
            --bg: #F0EEFF;
            --perigo: #ff7675;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            padding: 20px;
        }

        .container-adm {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            background: var(--roxo);
            padding: 30px;
            color: white;
            border-radius: 25px;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            background: white;
            border-radius: 20px;
            border-collapse: collapse;
            overflow: hidden;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #EEE;
        }

        th {
            background: #F8F9FD;
            color: var(--roxo);
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        .btn-apagar {
            background: var(--perigo);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container-adm">
        <header>
            <h1>Painel de Controle <span>NeurUp</span> 🦉</h1>
            <button onclick="window.location.href='admin_neuras.html'"
                style="background:white; color:var(--roxo); border:none; padding:10px 20px; border-radius:12px; font-weight:700; cursor:pointer;">Injetar
                Cards</button>
        </header>

        <table>
            <thead>
                <tr>
                    <th>Autor</th>
                    <th>Conteúdo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaPosts"></tbody>
        </table>
    </div>

    <script type="module">
        import { db, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "./liberi.js";

        onSnapshot(query(collection(db, "posts"), orderBy("data", "desc")), (snap) => {
            const tabela = document.getElementById('tabelaPosts');
            tabela.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                tabela.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td><b>${p.autor}</b></td>
                        <td><div style="max-width:400px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.texto}</div></td>
                        <td>
                            <button class="btn-apagar" onclick="window.excluirPost('${d.id}')">🗑️ Apagar</button>
                        </td>
                    </tr>
                `);
            });
        });

        window.excluirPost = async (id) => {
            if (confirm("Apagar postagem permanentemente?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };
    </script>
</body>

</html>
