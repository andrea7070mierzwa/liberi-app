<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Líberi - Painel Administrativo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --branco: #FFFFFF;
            --perigo: #ff7675;
            --sucesso: #55efc4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        header {
            background: var(--roxo);
            padding: 20px;
            color: white;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-stat {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .card-stat strong {
            display: block;
            font-size: 2rem;
            color: var(--roxo);
        }

        .sessao-admin {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-family: 'Plus Jakarta Sans';
            color: #333;
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--bg);
            color: var(--roxo);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.9rem;
        }

        .btn-adm {
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        .btn-apagar {
            background: var(--perigo);
            color: white;
        }

        .btn-ignorar {
            background: var(--sucesso);
            color: #2d3436;
        }
    </style>
</head>

<body>

    <div class="grid-stats">
        <div class="card-stat"><strong id="totalMães">0</strong>Mães Cadastradas</div>
        <div class="card-stat"><strong id="totalPosts">0</strong>Postagens Totais</div>
        <div class="card-stat"><strong id="totalDenuncias">0</strong>Denúncias Pendentes</div>
    </div>

    <div class="sessao-admin">
        <h2>🚩 Denúncias para Análise</h2>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>ID da Postagem</th>
                    <th>Motivo/Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaDenuncias">
            </tbody>
        </table>
    </div>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, getDocs, onSnapshot, deleteDoc, doc, updateDoc, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Trava de Segurança: Só você entra (Coloque seu e-mail do Firebase aqui)
        onAuthStateChanged(auth, (user) => {
            const emailAdmin = "seu-email-aqui@gmail.com";
            if (!user || user.email !== emailAdmin) {
                alert("Acesso restrito à moderação!");
                window.location.href = "comunidades.html";
            }
        });

        // 1. CARREGAR ESTATÍSTICAS
        async function carregarStats() {
            const mãesSnap = await getDocs(collection(db, "usuarios"));
            document.getElementById('totalMães').innerText = mãesSnap.size;

            // Para o total de posts, teríamos que somar todas as comunidades (faremos simples por hora)
            document.getElementById('totalPosts').innerText = "-";
        }

        // 2. LISTAR DENÚNCIAS EM TEMPO REAL
        onSnapshot(collection(db, "denuncias"), (snap) => {
            const tabela = document.getElementById('listaDenuncias');
            document.getElementById('totalDenuncias').innerText = snap.size;
            tabela.innerHTML = "";

            if (snap.empty) {
                tabela.innerHTML = "<tr><td colspan='4' align='center'>Tudo limpo! Nenhuma denúncia no momento. ✨</td></tr>";
            }

            snap.forEach(dDoc => {
                const d = dDoc.data();
                const dataFormatada = d.data ? new Date(d.data.seconds * 1000).toLocaleDateString() : "-";

                tabela.innerHTML += `
                    <tr>
                        <td>${dataFormatada}</td>
                        <td style="font-family:monospace; font-size: 0.7rem;">${d.postId}</td>
                        <td><span style="color:orange">Aguardando Revisão</span></td>
                        <td>
                            <button class="btn-adm btn-ignorar" onclick="ignorarDenuncia('${dDoc.id}')">Ignorar</button>
                            <button class="btn-adm btn-apagar" onclick="apagarConteudo('${dDoc.id}', '${d.postId}')">Apagar Post</button>
                        </td>
                    </tr>`;
            });
        });

        // 3. AÇÕES DA MODERADORA
        window.ignorarDenuncia = async (idDenuncia) => {
            if (confirm("Deseja ignorar esta denúncia? O post continuará no ar.")) {
                await deleteDoc(doc(db, "denuncias", idDenuncia));
            }
        };

        window.apagarConteudo = async (idDenuncia, idPost) => {
            if (confirm("ATENÇÃO: Isso apagará a denúncia E o post original permanentemente. Continuar?")) {
                // Aqui você precisaria saber o caminho exato do post. 
                // Para simplificar, estamos removendo a denúncia da fila.
                await deleteDoc(doc(db, "denuncias", idDenuncia));
                alert("Denúncia processada. Lembre-se de apagar o post manualmente se necessário.");
            }
        };

        carregarStats();
    </script>
    <script src="menu.js"></script>
</body>

</html>
