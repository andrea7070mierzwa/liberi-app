<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líberi - Painel Administrativo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --roxo: #6C5CE7;
            --bg: #F0EEFF;
            --branco: #FFFFFF;
            --perigo: #ff7675;
            --sucesso: #55efc4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #4A4A4A;
        }

        .container-adm {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            background: var(--roxo);
            padding: 30px;
            color: white;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Plus Jakarta Sans';
            margin: 0;
            font-size: 1.8rem;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-stat {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.02);
        }

        .card-stat strong {
            display: block;
            font-size: 2rem;
            color: var(--roxo);
            font-family: 'Plus Jakarta Sans';
        }

        /* TABELA DE MODERAÇÃO */
        .secao-adm {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-family: 'Plus Jakarta Sans';
            color: var(--roxo);
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #F0EEFF;
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #F0EEFF;
            font-size: 0.9rem;
        }

        .btn-adm {
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        .btn-apagar {
            background: #ffeaea;
            color: var(--perigo);
        }

        .btn-apagar:hover {
            background: var(--perigo);
            color: white;
        }

        .btn-manter {
            background: #eafff5;
            color: #2ecc71;
        }

        .btn-manter:hover {
            background: #2ecc71;
            color: white;
        }

        .preview-content {
            max-width: 300px;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <script type="module" src="menu.js"></script>

    <div class="container-adm">
        <header>
            <div>
                <h1>Central de Moderação</h1>
                <span>Bem-vinda, Andrea. A vila está sob seu cuidado! 🦉</span>
            </div>
            <button onclick="location.href='dashboard.html'"
                style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600;">Sair
                do Painel</button>
        </header>

        <div class="grid-stats">
            <div class="card-stat"><strong id="statUsers">0</strong> Usuários</div>
            <div class="card-stat"><strong id="statPosts">0</strong> Postagens</div>
            <div class="card-stat"><strong id="statAlertas" style="color: var(--perigo)">0</strong> Denúncias</div>
        </div>

        <div class="secao-adm">
            <h2>Postagens Recentes & Moderação</h2>
            <table id="tabelaPosts">
                <thead>
                    <tr>
                        <th>Autor</th>
                        <th>Conteúdo (Preview)</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./liberi.js";
        import { collection, query, orderBy, onSnapshot, doc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Proteção simples: só entra se estiver logado (No futuro, checaremos se o e-mail é o seu)
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
            carregarDados();
        });

        async function carregarDados() {
            // 1. Estatísticas Rápidas
            onSnapshot(collection(db, "usuarios"), snap => document.getElementById('statUsers').innerText = snap.size);
            onSnapshot(collection(db, "posts"), snap => document.getElementById('statPosts').innerText = snap.size);

            // 2. Tabela de Postagens para Moderação
            const qPosts = query(collection(db, "posts"), orderBy("data", "desc"));
            onSnapshot(qPosts, (snapshot) => {
                const tabela = document.getElementById('corpoTabela');
                tabela.innerHTML = "";

                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    const data = p.data?.toDate().toLocaleDateString('pt-BR') || "Recentemente";

                    tabela.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <img src="${p.fotoAutor}" style="width:30px; border-radius:8px;">
                                    <strong>${p.autor}</strong>
                                </div>
                            </td>
                            <td><div class="preview-content">${p.texto}</div></td>
                            <td>${data}</td>
                            <td>
                                <button class="btn-adm btn-manter" onclick="window.location.href='discussao.html?id=${docSnap.id}'">👁️ Ver</button>
                                <button class="btn-adm btn-apagar" onclick="window.excluirPost('${docSnap.id}')">🗑️ Apagar</button>
                            </td>
                        </tr>
                    `);
                });
            });
        }

        window.excluirPost = async (id) => {
            if (confirm("Você tem certeza que deseja apagar esta postagem permanentemente?")) {
                await deleteDoc(doc(db, "posts", id));
                alert("Postagem removida com sucesso!");
            }
        };
    </script>
</body>

</html>
